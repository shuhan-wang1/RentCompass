# Reverse proxy for the UK-rent agent — rentcompass.co.uk
# App runs as a Docker container: uvicorn/Flask on 127.0.0.1:5001.
#
# Install path: /etc/nginx/sites-available/rentcompass.co.uk.conf
#   symlink -> /etc/nginx/sites-enabled/  then `nginx -t && systemctl reload nginx`
#
# This starts as an HTTP (port 80) vhost. `certbot --nginx` will add the TLS
# server block on 443 and an HTTP->HTTPS redirect automatically. The SSE and
# timeout directives live inside `location /` so they survive certbot's edits.

upstream rentcompass_app {
    server 127.0.0.1:5001;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name rentcompass.co.uk www.rentcompass.co.uk;

    # Let's Encrypt HTTP-01 challenge webroot (harmless before/after TLS).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Upload headroom (property images, etc.)
    client_max_body_size 15m;

    location / {
        proxy_pass http://rentcompass_app;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # --- Server-Sent Events: the agent streams tokens/steps live. ---
        # Without these, nginx buffers the response and the UI appears frozen
        # until the whole turn finishes.
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;

        # An agent turn calls the LLM and can run tens of seconds; keep the
        # upstream connection open long enough to finish streaming.
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
