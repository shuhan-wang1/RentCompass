                if (!silent) showToast(t('error_connection'), 'error');
            }
        }

        // Renders one stored message into a pane. Returns its recommendations (if any)
        // so the caller can seed the pane's cached results.
        function renderStoredMessage(pane, msg) {
            if (msg.role === 'user') {
                const opts = {};
                if (msg.turn_id != null) opts.turnId = msg.turn_id;
                addMessage(pane, msg.content || '', 'user', opts);
                return null;
            }
            let icon = null;
            if (msg.response_type === 'clarification') icon = 'question';
            else if (msg.response_type === 'error') icon = 'error';
            const opts = {};
            if (icon) opts.icon = icon;
            if (msg.turn_id != null) opts.turnId = msg.turn_id;
            addMessage(pane, cleanRawResponse(msg.content || ''), 'alex', opts);
            return (Array.isArray(msg.recommendations) && msg.recommendations.length) ? msg.recommendations : null;
        }

        async function switchConversation(pane, cid) {
            pane = pane || mainPane;
            pane.conversationId = cid;
            if (pane === mainPane) persistMainConversation();
            setActivePane(pane);
            renderConversationList();
            closeSidebarMobile();
            if (pane.titleEl) pane.titleEl.textContent = conversationTitle(cid);

            const messagesDiv = pane.messagesEl;
            messagesDiv.innerHTML = '<div style="text-align:center;padding:40px;"><div class="spinner"></div></div>';
            pane.lastResponseType = null;
            pane.results = [];
            pane.areaRecos = [];
            pane.versionMap = {};
            clearPropertyFocus(pane);
            // This pane now owns the shared results/criteria panel; reset it fresh.
            resultsOwnerPane = pane;
            resetCriteria();

            try {
                const response = await apiFetch('/api/conversations/' + encodeURIComponent(cid) + '/messages', { method: 'GET' });
                if (!response.ok) {
                    showToast(t('error_load_messages'), 'error');
                    renderWelcomeMessage(pane);
                    return;
                }
                const data = await response.json();
                const msgs = Array.isArray(data.messages) ? data.messages : [];
                messagesDiv.innerHTML = '';
                let lastRecs = [];
                if (!msgs.length) {
                    renderWelcomeMessage(pane);
                } else {
                    msgs.forEach(m => { const r = renderStoredMessage(pane, m); if (r) lastRecs = r; });
                    for (let k = msgs.length - 1; k >= 0; k--) {
                        if (msgs[k].role === 'assistant' && msgs[k].response_type) {
                            pane.lastResponseType = msgs[k].response_type;
                            break;
                        }
                    }
                }
                pane.results = lastRecs;
                // Re-render property cards from this conversation's most recent recs.
                if (resultsOwnerPane === pane) { currentResults = lastRecs; displayResults(currentResults); }
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
                // Version switchers for this conversation's user turns.
                loadVersionMap(pane);
            } catch (error) {
                if (error && error.name === 'AbortError') return;
                showToast(t('error_connection'), 'error');
                renderWelcomeMessage(pane);
            }
        }

        function startBlankConversation(pane) {
            pane = pane || mainPane;
            pane.conversationId = null;
            if (pane === mainPane) persistMainConversation();
            pane.lastResponseType = null;
            pane.results = [];
            pane.areaRecos = [];
            pane.versionMap = {};
            clearPropertyFocus(pane);
            renderWelcomeMessage(pane);
            if (pane.titleEl) pane.titleEl.textContent = t('new_chat_title');
            resultsOwnerPane = pane;
            resetCriteria();
            currentResults = [];
            displayResults([]);
            renderConversationList();
        }

        async function newChat(pane) {
            pane = pane || mainPane;
            closeSidebarMobile();
            try {
                const response = await apiFetch('/api/conversations', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: getUserId(), title: t('new_chat_title') })
                });
                if (!response.ok) { showToast(t('error_create_conversation'), 'error'); return; }
                const data = await response.json();
                const conv = data.conversation || data;
                if (!conv || !conv.id) { showToast(t('error_create_conversation'), 'error'); return; }
                conversations.unshift(conv);
                pane.conversationId = conv.id;
                if (pane === mainPane) persistMainConversation();
                setActivePane(pane);
                pane.lastResponseType = null;
                pane.results = [];
                pane.areaRecos = [];
                pane.versionMap = {};
                clearPropertyFocus(pane);
                resultsOwnerPane = pane;
                resetCriteria();
                currentResults = [];
                renderWelcomeMessage(pane);
                if (pane.titleEl) pane.titleEl.textContent = conv.title || t('new_chat_title');
                displayResults([]);
                renderConversationList();
            } catch (error) {
                if (error && error.name === 'AbortError') return;
                // Offline fallback: start a local blank session; the backend will
                // create a conversation implicitly on the first message.
                startBlankConversation(pane);
                showToast(t('error_connection'), 'error');
            }
        }

        function promptRenameConversation(conv) {
            openDialog({
                title: t('rename_conversation'),
                withInput: true,
                defaultValue: conv.title || '',
                placeholder: t('conversation_title_placeholder'),
                confirmLabel: t('save'),
                onConfirm: async (val) => {
                    try {
                        const response = await apiFetch('/api/conversations/' + encodeURIComponent(conv.id), {
                            method: 'PATCH',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ user_id: getUserId(), title: val })
                        });
                        if (!response.ok) { showToast(t('error_rename'), 'error'); return; }
                        const data = await response.json();
                        const updated = (data && data.conversation) ? data.conversation : data;
                        conv.title = (updated && updated.title) ? updated.title : val;
                        if (updated && updated.updated_at) conv.updated_at = updated.updated_at;
                        // Keep any pane header currently showing this conversation in sync.
                        eachPane(p => { if (p.titleEl && p.conversationId === conv.id) p.titleEl.textContent = conv.title; });
                        renderConversationList();
                    } catch (error) {
                        if (error && error.name === 'AbortError') return;
                        showToast(t('error_connection'), 'error');
                    }
                }
            });
        }

        function promptDeleteConversation(conv) {
            openDialog({
                title: t('delete_conversation'),
                message: t('delete_conversation_confirm'),
                confirmLabel: t('delete'),
                onConfirm: async () => {
                    try {
                        const response = await apiFetch('/api/conversations/' + encodeURIComponent(conv.id), { method: 'DELETE' });
                        if (!response.ok) { showToast(t('error_delete'), 'error'); return; }
                        conversations = conversations.filter(c => c.id !== conv.id);
                        // Split-screen sync: a deleted conversation must not stay open in a pane.
                        if (secondaryPane && secondaryPane.conversationId === conv.id) closeSecondaryPane();
                        if (mainPane.conversationId === conv.id) {
                            // Fall back to another conversation not already open in the other pane.
                            const next = conversations.find(c => !(secondaryPane && secondaryPane.conversationId === c.id));
                            if (next) switchConversation(mainPane, next.id);
                            else startBlankConversation(mainPane);
                        } else {
                            renderConversationList();
                        }
                    } catch (error) {
                        if (error && error.name === 'AbortError') return;
                        showToast(t('error_connection'), 'error');
                    }
                }
            });
        }

        // Session fork. afterTurnId=null → the backend forks from the latest completed
        // turn (sidebar "Branch"); a turn id → fork from that assistant message
        // ("Branch from here"). Idempotency key is generated per click; the disabled
        // trigger prevents a second in-flight request for the same click.
        async function forkConversation(sourceCid, afterTurnId, triggerEl, pane) {
            pane = pane || mainPane;
            if (!sourceCid) return;
            if (triggerEl && triggerEl.disabled) return;
            if (triggerEl) triggerEl.disabled = true;
            const idempotencyKey = uuidHex();
            try {
                const body = {};
                if (afterTurnId != null && afterTurnId !== '') body.after_turn_id = afterTurnId;
                const uid = getUserId();
                if (uid) body.user_id = uid;
                const response = await apiFetch('/api/conversations/' + encodeURIComponent(sourceCid) + '/fork', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Idempotency-Key': idempotencyKey
                    },
                    body: JSON.stringify(body)
                });
                if (!response.ok) { showToast(t('error_fork'), 'error'); return; }
                const data = await response.json();
                const conv = (data && data.conversation) ? data.conversation : data;
                if (!conv || !conv.id) { showToast(t('error_fork'), 'error'); return; }
                showToast(t('branch_created'), 'success');
                await loadConversations(true);
                await switchConversation(pane, conv.id);
            } catch (error) {
                if (error && error.name === 'AbortError') return;
                showToast(t('error_fork'), 'error');
            } finally {
                if (triggerEl) triggerEl.disabled = false;
            }
        }

        /* -------------------------------------------------------------------------- */
        /* SPLIT-SCREEN COMPARE (drag a conversation, or click "Compare")             */
        /* Secondary pane is a fully-interactive ChatPane; the main pane never regresses.*/
        /* -------------------------------------------------------------------------- */
        let dragConvId = null;

        function buildSecondaryPane() {
            const root = el('div', 'chat-panel chat-pane chat-pane-secondary');
            const bar = el('div', 'pane-topbar');

        // Make a pane become "active" (Ask-AI / criteria fallback target) on interaction.
        function wirePaneActivation(pane) {
            pane.inputEl.addEventListener('focus', () => setActivePane(pane));
            pane.messagesEl.addEventListener('mousedown', () => setActivePane(pane));
        }

        // Compare button (non-drag path) — equivalent to dropping on the right half.
        function requestCompare(cid) {
            if (window.innerWidth < 800) { showToast(t('split_too_narrow'), 'error'); return; }
            openCompare(cid, 'right');
        }

        // Enter split mode (single -> two panes) with cid loaded into the new secondary.
        function enterSplit(cid) {
            if (window.innerWidth < 800) { showToast(t('split_too_narrow'), 'error'); return; }
            // Already split (defensive): load into the existing secondary instead of stacking a third pane.
            if (secondaryPane) { openCompare(cid, 'right'); return; }
            if (mainPane.conversationId && mainPane.conversationId === cid) { showToast(t('split_same_conv'), 'error'); return; }
            secondaryPane = buildSecondaryPane();
            document.getElementById('chatPanesWrap').appendChild(secondaryPane.root);
            document.querySelector('.main-container').classList.add('split-active');
            splitMode = true;
            renderQuickActions(secondaryPane);
            switchConversation(secondaryPane, cid);
        }

        // Route a compare request to the right pane/side, enforcing the "not both sides"
        // rule. side is 'left' (main) or 'right' (secondary).
        function openCompare(cid, side) {
            if (window.innerWidth < 800) { showToast(t('split_too_narrow'), 'error'); return; }
            if (!cid) return;
            if (!splitMode) { enterSplit(cid); return; }
            const targetPane = (side === 'left') ? mainPane : secondaryPane;
            const otherPane = (side === 'left') ? secondaryPane : mainPane;
            if (otherPane && otherPane.conversationId === cid) { showToast(t('split_same_conv'), 'error'); return; }
            if (targetPane.conversationId === cid) return;   // already there — no-op
            switchConversation(targetPane, cid);
        }

        function closeSecondaryPane() {
            if (!secondaryPane) return;
            if (secondaryPane.activeController) secondaryPane.activeController.abort();
            secondaryPane.root.remove();
            if (resultsOwnerPane === secondaryPane) resultsOwnerPane = mainPane;
            secondaryPane = null;
            splitMode = false;
            document.querySelector('.main-container').classList.remove('split-active');
            setActivePane(mainPane);
            mainPane.root.classList.remove('is-active-pane');
            // Hand the shared results panel back to the main pane.
            if (favoritesTabActive()) {
                renderFavorites();
            } else {
                currentResults = mainPane.results || [];
                currentAreaRecommendations = mainPane.areaRecos || [];
                displayResults(currentResults);
            }
            renderConversationList();
        }

        /* --- Drag & drop (HTML5) --- */
        function onConvDragStart(e, conv, item) {
            dragConvId = conv.id;
            if (e.dataTransfer) {
                e.dataTransfer.setData('text/plain', conv.id);
                e.dataTransfer.effectAllowed = 'move';
            }
            item.classList.add('dragging');
            if (window.innerWidth >= 800) showDropOverlay();
        }
        function onConvDragEnd(item) {
            item.classList.remove('dragging');
            hideDropOverlay();
            dragConvId = null;
        }

        function buildDropHalf(side) {
            const half = el('div', 'drop-half');
            half.dataset.side = side;
            half.textContent = t('drop_here_hint');
            half.addEventListener('dragover', e => { e.preventDefault(); if (e.dataTransfer) e.dataTransfer.dropEffect = 'move'; half.classList.add('drag-over'); });
            half.addEventListener('dragleave', () => half.classList.remove('drag-over'));
            half.addEventListener('drop', e => {
                e.preventDefault();
                half.classList.remove('drag-over');
                const cid = (e.dataTransfer && e.dataTransfer.getData('text/plain')) || dragConvId;
                hideDropOverlay();
                openCompare(cid, side);
            });
            return half;
        }
        function showDropOverlay() {
            if (window.innerWidth < 800) return;   // narrow guard: no drop zones
            hideDropOverlay();
            const wrap = document.getElementById('chatPanesWrap');
            const overlay = el('div', 'drop-overlay active');
            overlay.id = 'dropOverlay';
            if (splitMode) {
                overlay.appendChild(buildDropHalf('left'));
                overlay.appendChild(buildDropHalf('right'));
            } else {
                // Single mode: left half stays the current pane; only the right half is a target.
                const spacer = el('div');
                spacer.style.flex = '1 1 0';
                overlay.appendChild(spacer);
                overlay.appendChild(buildDropHalf('right'));
            }
            wrap.appendChild(overlay);
        }
        function hideDropOverlay() {
            const o = document.getElementById('dropOverlay');
            if (o) o.remove();
        }

        // Swap the active identity (guest switch, login, register, logout all funnel here):
        // repoint localStorage, wipe in-memory per-user state, then reload from the server.
        async function applyIdentitySwitch(uid, name) {
            localStorage.setItem(LS_USER_ID, uid);

        /* -------------------------------------------------------------------------- */
        /* AUTHENTICATION (username/password)                                         */
        /* - The server session is authoritative; on load we sync localStorage to it. */
        /* - Guests keep the self-declared-id flow; this layer is purely additive.    */
        /* -------------------------------------------------------------------------- */
        let authState = { authenticated: false };

        function updateAuthUI() {
            const authed = !!(authState && authState.authenticated);
            const show = (id, on) => { const b = document.getElementById(id); if (b) b.style.display = on ? '' : 'none'; };
            show('loginBtn', !authed);       // guest-only
            show('renameUserBtn', !authed);  // guest-only (account uses its display_name)
            show('switchUserBtn', !authed);  // guest-only
            show('logoutBtn', authed);       // authed-only
        }

        async function refreshAuthState() {
            try {
                const resp = await apiFetch('/api/auth/me', { method: 'GET' });
                if (resp.ok) {
                    authState = await resp.json() || { authenticated: false };
                    if (authState.authenticated && authState.user_id) {
                        // Mirror the authoritative server identity into localStorage so the
                        // X-User-Id header/query sent on every request matches the session.
                        localStorage.setItem(LS_USER_ID, authState.user_id);
                        localStorage.setItem(LS_USER_NAME, authState.display_name || authState.username || 'User');
                    }
                } else {
                    authState = { authenticated: false };
                }
            } catch (e) {
                authState = { authenticated: false };  // offline → treat as guest
            }
            updateAuthUI();
            updateUserNameLabel();
        }

        async function onAuthSuccess(data, toastMsg) {
            authState = {
                authenticated: true,
                user_id: data.user_id,
                username: data.username,
                display_name: data.display_name,
            };
            await applyIdentitySwitch(data.user_id, data.display_name || data.username);
            updateAuthUI();
            showToast(toastMsg, 'success');
        }

        async function doLogin(username, password) {
            const resp = await apiFetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password }),
            });
            if (resp.ok) {
                await onAuthSuccess(await resp.json(), t('login_success'));
                return { ok: true };
            }
            return { ok: false, message: resp.status === 401 ? t('err_auth_failed') : t('err_auth_generic') };
        }

        async function doRegister(username, password, displayName) {
            const resp = await apiFetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password, display_name: displayName || undefined }),
            });
            if (resp.ok) {
                await onAuthSuccess(await resp.json(), t('register_success'));
                return { ok: true };
            }
            if (resp.status === 409) return { ok: false, message: t('err_username_taken') };
            let msg = t('err_auth_generic');
            try { const e = await resp.json(); if (e && e.error) msg = e.error; } catch (_) {}
            return { ok: false, message: msg };
        }

        async function doLogout() {
            closeUserDropdown();
            try {
                await apiFetch('/api/auth/logout', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({}),
                });
            } catch (e) { /* ignore — clear locally regardless */ }
            authState = { authenticated: false };
            await applyIdentitySwitch(uuidHex(), 'Guest');  // fresh guest identity
            updateAuthUI();
            showToast(t('logout_success'), 'success');
        }

        function openAuthDialog(mode) {
            mode = mode || 'login';
            closeUserDropdown();
            const overlay = document.getElementById('dialogOverlay');
            overlay.innerHTML = '';
            const card = el('div', 'dialog-card');

            const title = el('div', 'dialog-title');
            card.appendChild(title);

            const errBox = el('div', 'dialog-message');
            errBox.style.color = '#e5484d';
            errBox.style.display = 'none';
            card.appendChild(errBox);

            const userInput = el('input', 'dialog-input');
            userInput.type = 'text';
            userInput.autocomplete = 'username';
            userInput.setAttribute('maxlength', '32');
            card.appendChild(userInput);

            const passInput = el('input', 'dialog-input');
            passInput.type = 'password';
            passInput.setAttribute('maxlength', '128');
            card.appendChild(passInput);

            const nameInput = el('input', 'dialog-input');
            nameInput.type = 'text';
            nameInput.autocomplete = 'nickname';
            nameInput.setAttribute('maxlength', '64');
            card.appendChild(nameInput);

            const switchLink = el('button', 'dialog-link');
            switchLink.style.cssText = 'background:none;border:none;color:var(--primary-color);cursor:pointer;font-size:13px;padding:4px 2px;text-align:left;';
            card.appendChild(switchLink);

            const actions = el('div', 'dialog-actions');
            const cancel = el('button', 'dialog-btn');
            cancel.textContent = t('cancel');
            cancel.addEventListener('click', closeDialog);
            const submit = el('button', 'dialog-btn primary');
            actions.appendChild(cancel);
            actions.appendChild(submit);
            card.appendChild(actions);

            let busy = false;
            const showErr = (msg) => { errBox.textContent = msg || ''; errBox.style.display = msg ? 'block' : 'none'; };
            function applyMode() {
                showErr('');
                const reg = mode === 'register';
                title.textContent = reg ? t('register_title') : t('login_title');
                userInput.placeholder = t('username_label') + (reg ? ' · ' + t('username_placeholder') : '');
                passInput.placeholder = t('password_label') + (reg ? ' · ' + t('password_placeholder') : '');
                passInput.autocomplete = reg ? 'new-password' : 'current-password';
                nameInput.placeholder = t('display_name_label');
                nameInput.style.display = reg ? '' : 'none';
                submit.textContent = reg ? t('create_account') : t('sign_in');
                switchLink.textContent = reg ? t('switch_to_login') : t('switch_to_register');
            }
            switchLink.addEventListener('click', () => {
                mode = mode === 'register' ? 'login' : 'register';
                applyMode();
                userInput.focus();
            });

            async function doSubmit() {
                if (busy) return;
                const username = userInput.value.trim();
                const password = passInput.value;
                if (!username || !password) { showErr(t('err_fields_required')); return; }
                busy = true; submit.disabled = true; submit.style.opacity = '0.6';
                let res;
                try {
                    res = mode === 'register'
                        ? await doRegister(username, password, nameInput.value.trim())
                        : await doLogin(username, password);
                } catch (e) {
                    res = { ok: false, message: t('err_auth_generic') };
                }
                if (res && res.ok) { closeDialog(); return; }
                showErr((res && res.message) || t('err_auth_generic'));
                busy = false; submit.disabled = false; submit.style.opacity = '';
            }
            submit.addEventListener('click', doSubmit);
            [userInput, passInput, nameInput].forEach(inp => inp.addEventListener('keydown', e => {
                if (e.key === 'Enter') { e.preventDefault(); doSubmit(); }
            }));

            applyMode();
            overlay.appendChild(card);
            overlay.style.display = 'flex';
            userInput.focus();
        }

        /* -------------------------------------------------------------------------- */
        /* SEARCH CRITERIA (structured input — panel + auto-popup modal)              */
        /* Zero workflow priors: only Area is required; everything else optional.     */
        /* -------------------------------------------------------------------------- */
        function parseIntOrNull(v) {
            if (v === null || v === undefined || v === '') return null;
            const n = parseInt(v, 10);
            return isNaN(n) ? null : n;
        }

        function defaultCriteria() {
            return {
                area: '', areas: [], max_budget: null, budget_period: 'month', bedrooms: null,
                room_type: null,
                commute_destination: '', max_commute_time: null, no_commute: false,
                move_in_date: ''   // optional ISO "YYYY-MM-DD"; '' = unset
            };
        }

        // Dedupe a list of area names case-insensitively, preserving order + original case.
        function dedupeAreas(list) {
            const out = [], seen = {};
            (Array.isArray(list) ? list : []).forEach(function (x) {
                const s = (typeof x === 'string') ? x.trim() : '';
                if (!s) return;
                const k = s.toLowerCase();
                if (seen[k]) return;
                seen[k] = true;
                out.push(s);
            });
            return out;
        }

        // Accept either canonical shape (max_commute_time) or the clarification shape
        // (max_travel_time); coerce everything to a single internal representation.
        function normalizeCriteria(raw) {
            raw = raw || {};
            const c = defaultCriteria();
            if (typeof raw.area === 'string') c.area = raw.area;
            // Multi-area: prefer an explicit `areas` array, else fall back to single `area`.
            let areas = Array.isArray(raw.areas) ? dedupeAreas(raw.areas) : [];
            if (!areas.length && c.area && c.area.trim()) areas = [c.area.trim()];
            c.areas = areas;
            if ((!c.area || !c.area.trim()) && areas.length) c.area = areas[0];
            c.max_budget = parseIntOrNull(raw.max_budget);
            c.budget_period = (raw.budget_period === 'week') ? 'week' : 'month';
            c.bedrooms = parseIntOrNull(raw.bedrooms);   // null=Any, 0=Studio, 1/2/3
            if (typeof raw.room_type === 'string' && raw.room_type) c.room_type = raw.room_type; // null=Any
            if (typeof raw.commute_destination === 'string') c.commute_destination = raw.commute_destination;
            let mct = raw.max_commute_time;
            if (mct === undefined || mct === null || mct === '') mct = raw.max_travel_time;
            c.max_commute_time = parseIntOrNull(mct);
            c.no_commute = !!raw.no_commute;
            // Move-in date — only keep a well-formed ISO value (the backend 400s on
            // malformed input, so we never round-trip junk).
            if (typeof raw.move_in_date === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(raw.move_in_date.trim())) {
                c.move_in_date = raw.move_in_date.trim();
            }
            return c;
        }

        // Clean localized one-line echo, e.g.
        //   en "Search criteria: Manchester, Fallowfield — commute to University of Manchester, up to £1500/mo, 1 bed"
        //   zh "搜索条件：Manchester、Fallowfield，通勤至 University of Manchester，预算 £1500/月以内，1 室"
        // No emoji / glyph shorthand — the output is inserted into the chat stream.
        function summarizeCriteria(c) {
            // Areas (support multi-area; single `area` kept for back-compat).
            const areas = (Array.isArray(c.areas) && c.areas.length)
                ? c.areas
                : (c.area ? [c.area] : []);
            const areaText = areas.join(t('echo_area_join'));

            // Commute clause: explicit "no commute", a destination (+ optional time), or nothing.
            let commute = '';
            if (c.no_commute) {
                commute = t('echo_no_commute');
            } else if (c.commute_destination) {
                commute = (c.max_commute_time != null)
                    ? t('echo_commute_to_time').replace('{dest}', c.commute_destination).replace('{min}', c.max_commute_time)
                    : t('echo_commute_to').replace('{dest}', c.commute_destination);
            }

            // Areas and commute share the language-specific commute separator
            // (en " — ", zh "，"); a commute-only search drops straight to the clause.
            let head = areaText;
            if (commute) head = head ? (head + t('echo_commute_sep') + commute) : commute;

            // Remaining clauses reuse the existing localized fragments.
            const extras = [];
            if (c.max_budget != null) {
                const per = (c.budget_period === 'week') ? t('per_wk_short') : t('per_mo_short');
                extras.push(t('echo_budget').replace('{amount}', c.max_budget).replace('{per}', per));
            }
            if (c.bedrooms != null) {
                extras.push(c.bedrooms === 0 ? t('bedrooms_studio') : (c.bedrooms + ' ' + t('bed_unit')));
            }
            if (c.move_in_date) extras.push(t('avail_from_tpl').replace('{date}', c.move_in_date));

            const all = [head].concat(extras).filter(Boolean);
            return t('echo_prefix') + all.join(t('echo_clause_join'));
        }

        // Build one criteria form instance (used by BOTH the persistent panel and the
        // modal). Returns an API to read/fill/focus/mark/busy. All text goes through
        // textContent or placeholder — no innerHTML with dynamic data.
        function createCriteriaForm(opts) {
            opts = opts || {};
            const form = el('form', 'criteria-form');
            const grid = el('div', 'criteria-grid');

            function labelField(key, required, full) {
                const lab = el('label', 'criteria-field' + (full ? ' col-span-2' : ''));
                const cap = el('span', 'criteria-label');
                const capText = document.createElement('span');
                capText.setAttribute('data-i18n', key);
                capText.textContent = t(key);
                cap.appendChild(capText);
                if (required) { const r = el('span', 'req'); r.textContent = ' *'; cap.appendChild(r); }
                lab.appendChild(cap);
                return lab;
            }

            // Area (required, full width). Supports MULTIPLE areas: each committed area
            // renders as a removable chip; the text input adds a new area (Enter / comma /
            // blur), and any pending typed value is also merged in at read() time so the
            // single-input flow keeps working exactly as before.
            let selectedAreas = [];

            const areaField = el('div', 'criteria-field col-span-2');
            const areaCap = el('span', 'criteria-label');
            const areaCapText = document.createElement('span');
            areaCapText.setAttribute('data-i18n', 'criteria_area');
            areaCapText.textContent = t('criteria_area');
            areaCap.appendChild(areaCapText);
            const areaReq = el('span', 'req'); areaReq.textContent = ' *'; areaCap.appendChild(areaReq);
            areaField.appendChild(areaCap);

            const areaChips = el('div', 'area-chips');
            areaChips.style.display = 'none';
            areaField.appendChild(areaChips);

            const areaInput = el('input', 'criteria-input');
            areaInput.type = 'text';
            areaInput.setAttribute('maxlength', '80');
            areaInput.setAttribute('data-i18n-ph', 'criteria_area_ph');
            areaInput.placeholder = t('criteria_area_ph');
            areaField.appendChild(areaInput);
            grid.appendChild(areaField);

            function areaKey(s) { return (typeof s === 'string') ? s.trim().toLowerCase() : ''; }
            function hasArea(name) { const k = areaKey(name); return selectedAreas.some(function (a) { return areaKey(a) === k; }); }
            // Notify listeners (e.g. the recommended-area chip highlight) whenever the
            // committed area set changes, so dependent UI stays in lockstep with state.
            function notifyAreasChanged() {
                if (typeof opts.onAreasChanged === 'function') opts.onAreasChanged();
            }
            function renderAreaChips() {
                areaChips.innerHTML = '';
                if (!selectedAreas.length) { areaChips.style.display = 'none'; notifyAreasChanged(); return; }
                areaChips.style.display = 'flex';
                selectedAreas.forEach(function (name) {
                    const chip = el('span', 'area-chip');
                    const lab = el('span', 'area-chip-label');
                    lab.textContent = name;
                    chip.appendChild(lab);
                    const rm = el('button', 'area-chip-remove');
                    rm.type = 'button';
                    rm.setAttribute('aria-label', t('area_remove'));
                    rm.textContent = '×';   // ×
                    rm.addEventListener('click', function (e) { e.preventDefault(); removeArea(name); });
                    chip.appendChild(rm);
                    areaChips.appendChild(chip);
                });
                notifyAreasChanged();
            }
            function addAreaLocal(name) {
                name = (typeof name === 'string') ? name.trim() : '';
                if (!name || hasArea(name)) return false;
                selectedAreas.push(name);
                renderAreaChips();
                areaInput.classList.remove('input-error');
                return true;
            }
            function removeArea(name) {
                const k = areaKey(name);
                // Keep at least one area — unless a commute destination is set, in which
                // case the search can run purely commute-driven.
                const hasCommuteDest = !noInput.checked && destInput.value.trim().length > 0;
                if (selectedAreas.length <= 1 && !hasCommuteDest) {
                    showToast(t('area_min_one'), null);
                    return;
                }
                selectedAreas = selectedAreas.filter(function (a) { return areaKey(a) !== k; });
                renderAreaChips();
            }
            function setAreas(list) {
                selectedAreas = [];
                (Array.isArray(list) ? list : []).forEach(function (x) {
                    const n = (typeof x === 'string') ? x.trim() : '';
                    if (n && !hasArea(n)) selectedAreas.push(n);
                });
                renderAreaChips();
            }
            function commitAreaInput() {
                const v = areaInput.value.trim();
                if (!v) return;
                addAreaLocal(v);
                areaInput.value = '';
            }
            areaInput.addEventListener('keydown', function (e) {
                if (e.key === 'Enter' || e.key === ',') { e.preventDefault(); commitAreaInput(); }
            });
            areaInput.addEventListener('blur', commitAreaInput);

            // Budget + period
            const budgetField = labelField('criteria_budget', false, false);
            const budgetRow = el('div', 'criteria-budget-row');
            const budgetInput = el('input', 'criteria-input');
            budgetInput.type = 'number';
            budgetInput.min = '0';
            budgetInput.step = '50';
            budgetInput.setAttribute('inputmode', 'numeric');
            budgetInput.setAttribute('data-i18n-ph', 'criteria_budget_ph');
            budgetInput.placeholder = t('criteria_budget_ph');
            const periodSelect = el('select', 'criteria-select');
            const optM = document.createElement('option');
            optM.value = 'month'; optM.setAttribute('data-i18n', 'per_month'); optM.textContent = t('per_month');
            const optW = document.createElement('option');
            optW.value = 'week'; optW.setAttribute('data-i18n', 'per_week'); optW.textContent = t('per_week');
            periodSelect.appendChild(optM); periodSelect.appendChild(optW);
            budgetRow.appendChild(budgetInput); budgetRow.appendChild(periodSelect);
            budgetField.appendChild(budgetRow);
            grid.appendChild(budgetField);

            // Bedrooms
            const bedField = labelField('criteria_bedrooms', false, false);
            const bedSelect = el('select', 'criteria-select');
            [['', 'bedrooms_any', null], ['0', 'bedrooms_studio', null], ['1', null, '1'], ['2', null, '2'], ['3', null, '3+']]
                .forEach(function (o) {
                    const opt = document.createElement('option');
                    opt.value = o[0];
                    if (o[1]) { opt.setAttribute('data-i18n', o[1]); opt.textContent = t(o[1]); }
                    else { opt.textContent = o[2]; }
                    bedSelect.appendChild(opt);
                });
            bedField.appendChild(bedSelect);
            grid.appendChild(bedField);

            // Room type (full width so it doesn't orphan a half-row before the
            // full-width Commute field). Values match the /api/search_direct enum.
            const roomField = labelField('criteria_room_type', false, true);
            const roomSelect = el('select', 'criteria-select');
            [['', 'room_type_any'], ['studio', 'room_type_studio'], ['ensuite', 'room_type_ensuite'], ['shared', 'room_type_shared']]
                .forEach(function (o) {
                    const opt = document.createElement('option');
                    opt.value = o[0];
                    opt.setAttribute('data-i18n', o[1]);
                    opt.textContent = t(o[1]);
                    roomSelect.appendChild(opt);
                });
            roomField.appendChild(roomSelect);
            grid.appendChild(roomField);

            // Commute destination (full width)
            const destField = labelField('criteria_commute_dest', false, true);
            const destInput = el('input', 'criteria-input');
            destInput.type = 'text';
            destInput.setAttribute('maxlength', '80');
            destInput.setAttribute('data-i18n-ph', 'criteria_commute_dest_ph');
            destInput.placeholder = t('criteria_commute_dest_ph');
            destField.appendChild(destInput);
            grid.appendChild(destField);

            // Max commute
            const maxField = labelField('criteria_max_commute', false, false);
            const maxInput = el('input', 'criteria-input');
            maxInput.type = 'number';
            maxInput.min = '0';
            maxInput.step = '5';
            maxInput.setAttribute('inputmode', 'numeric');
            maxInput.setAttribute('data-i18n-ph', 'criteria_max_commute_ph');
            maxInput.placeholder = t('criteria_max_commute_ph');
            maxField.appendChild(maxInput);
            grid.appendChild(maxField);

            // "I don't commute"
            const noField = el('label', 'criteria-field criteria-check');
            const noInput = document.createElement('input');
            noInput.type = 'checkbox';
            const noText = el('span', 'criteria-label');
            noText.setAttribute('data-i18n', 'criteria_no_commute');
            noText.textContent = t('criteria_no_commute');
            noField.appendChild(noInput); noField.appendChild(noText);
            grid.appendChild(noField);

            // Move-in date (optional, full width). Native picker → value is ISO
            // "YYYY-MM-DD" (or '' when unset); optional-ness shown via a title hint
            // (a date input has no visible placeholder), mirroring the commute field.
            const moveInField = labelField('criteria_move_in', false, true);
            const moveInWrap = el('div', 'criteria-date-wrap is-empty');
            const moveInInput = el('input', 'criteria-input criteria-date-native');
            moveInInput.type = 'date';
            moveInInput.setAttribute('data-i18n-title', 'criteria_move_in_hint');
            moveInInput.title = t('criteria_move_in_hint');
            // Localized placeholder overlay: the native date picker's empty-state text
            // (年/月/日) follows the browser locale, not the app language. data-i18n keeps
            // this span in sync with the language switch (see setLanguage).
            const moveInPh = el('span', 'criteria-date-ph');
            moveInPh.setAttribute('data-i18n', 'criteria_move_in_ph');
            moveInPh.textContent = t('criteria_move_in_ph');
            moveInWrap.appendChild(moveInInput);
            moveInWrap.appendChild(moveInPh);
            moveInField.appendChild(moveInWrap);
            grid.appendChild(moveInField);
            // Toggle the overlay purely from the field's value (single source of truth).
            function syncMoveInPlaceholder() {
                moveInWrap.classList.toggle('is-empty', !moveInInput.value);
            }

            form.appendChild(grid);

            const submitBtn = el('button', 'criteria-search-btn');
            submitBtn.type = 'submit';
            const btnIcon = document.createElement('span');
            btnIcon.innerHTML = getIcon('search', 'icon-sm'); // trusted local icon
            const btnText = document.createElement('span');
            btnText.setAttribute('data-i18n', 'criteria_search_btn');
            btnText.textContent = t('criteria_search_btn');
            submitBtn.appendChild(btnIcon); submitBtn.appendChild(btnText);
            form.appendChild(submitBtn);

            function updateCommuteDisabled() {
                const off = noInput.checked;
                destInput.disabled = off;
                maxInput.disabled = off;
                destField.classList.toggle('is-disabled', off);
                maxField.classList.toggle('is-disabled', off);
            }
            noInput.addEventListener('change', updateCommuteDisabled);

            // --- Missing-field error highlighting (generalizes markAreaError) ---
            // commute is a group: destination + max + the "don't commute" row share one
            // highlight, cleared together when the user touches any of them.
            function clearCommuteError() {
                destInput.classList.remove('input-error');
                maxInput.classList.remove('input-error');
                noField.classList.remove('field-error');
            }
            function clearAllFieldErrors() {
                [areaInput, budgetInput, roomSelect, destInput, maxInput, moveInInput]
                    .forEach(function (n) { n.classList.remove('input-error'); });
                noField.classList.remove('field-error');
            }
            // Auto-clear a field's error as soon as the user edits it (imitates area).
            areaInput.addEventListener('input', function () { areaInput.classList.remove('input-error'); });
            budgetInput.addEventListener('input', function () { budgetInput.classList.remove('input-error'); });
            roomSelect.addEventListener('change', function () { roomSelect.classList.remove('input-error'); });
            destInput.addEventListener('input', clearCommuteError);
            maxInput.addEventListener('input', clearCommuteError);
            noInput.addEventListener('change', clearCommuteError);
            moveInInput.addEventListener('change', function () { moveInInput.classList.remove('input-error'); syncMoveInPlaceholder(); });
            moveInInput.addEventListener('input', function () { moveInInput.classList.remove('input-error'); syncMoveInPlaceholder(); });

            // Merge committed chips with any pending (un-committed) text in the input.
            function currentAreas() {
                const areas = selectedAreas.slice();
                const pending = areaInput.value.trim();
                if (pending && !hasArea(pending)) areas.push(pending);
                return areas;
            }

            const api = {
                form: form,
                read: function () {
                    const areas = currentAreas();
                    return {
                        area: areas.length ? areas[0] : '',   // back-compat single area
                        areas: areas,
                        max_budget: parseIntOrNull(budgetInput.value),
                        budget_period: periodSelect.value === 'week' ? 'week' : 'month',
                        bedrooms: bedSelect.value === '' ? null : parseIntOrNull(bedSelect.value),
                        room_type: roomSelect.value === '' ? null : roomSelect.value,
                        commute_destination: destInput.value.trim(),
                        max_commute_time: parseIntOrNull(maxInput.value),
                        no_commute: noInput.checked,
                        move_in_date: moveInInput.value || ''   // native date input → ISO or ''
                    };
                },
                // respectActive: skip inputs the user is currently editing (auto-fill only)
                fill: function (c, respectActive) {
                    c = c || defaultCriteria();
                    const skip = function (node) { return respectActive && node === document.activeElement; };
                    if (!skip(areaInput)) {
                        const list = (Array.isArray(c.areas) && c.areas.length)
                            ? c.areas
                            : (c.area && c.area.trim() ? [c.area.trim()] : []);
                        setAreas(list);
                        areaInput.value = '';   // input is the "add area" field — keep it empty
                    }
                    if (!skip(budgetInput)) budgetInput.value = (c.max_budget != null ? String(c.max_budget) : '');
                    if (!skip(periodSelect)) periodSelect.value = (c.budget_period === 'week' ? 'week' : 'month');
                    if (!skip(bedSelect)) bedSelect.value = (c.bedrooms != null ? String(c.bedrooms) : '');
                    if (!skip(roomSelect)) roomSelect.value = c.room_type || '';
                    if (!skip(destInput)) destInput.value = c.commute_destination || '';
                    if (!skip(maxInput)) maxInput.value = (c.max_commute_time != null ? String(c.max_commute_time) : '');
                    if (!skip(noInput)) noInput.checked = !!c.no_commute;
                    if (!skip(moveInInput)) { moveInInput.value = c.move_in_date || ''; syncMoveInPlaceholder(); }
                    updateCommuteDisabled();
                    clearAllFieldErrors();
                },
                // Add an area to this form's selection (used by recommended-area chips).
                // Returns true if newly added, false if it was already selected.
                addArea: function (name) { return addAreaLocal(name); },
                getAreas: function () { return currentAreas(); },
                focusArea: function () { areaInput.focus(); if (typeof areaInput.select === 'function') areaInput.select(); },
                markAreaError: function () { areaInput.classList.add('input-error'); },
                // Highlight a single missing field by its canonical or legacy backend name.
                markFieldError: function (key) {
                    switch (key) {
                        case 'area': areaInput.classList.add('input-error'); break;
                        case 'budget': case 'max_budget': budgetInput.classList.add('input-error'); break;
                        case 'room_type': roomSelect.classList.add('input-error'); break;
                        case 'commute': case 'destination':
                            // The soft gate nudges the user to state a commute destination
                            // (or tick "I don't commute"). Max commute time is OPTIONAL and
                            // must NEVER be flagged/validated — so max_travel_time /
                            // max_commute_time are deliberately not handled here, and the
                            // Max-commute input is left out of the commute-group highlight.
                            destInput.classList.add('input-error');
                            noField.classList.add('field-error');
                            break;
                        case 'move_in': case 'move_in_date':
                            moveInInput.classList.add('input-error');
                            break;
                    }
                },
                clearFieldErrors: clearAllFieldErrors,
                setBusy: function (busy) { submitBtn.disabled = !!busy; }
            };

            form.addEventListener('submit', function (e) {
                e.preventDefault();
                const criteria = api.read();
                // Area is required UNLESS a commute destination is set (commute-only search).
                const hasCommute = !criteria.no_commute && !!(criteria.commute_destination && criteria.commute_destination.trim());
                if ((!criteria.areas || !criteria.areas.length) && !hasCommute) {
                    api.markAreaError();
                    api.focusArea();
                    showToast(t('criteria_area_required'), 'error');
                    return;
                }
                if (typeof opts.onSubmit === 'function') opts.onSubmit(criteria, api);
            });

            activeCriteriaForms.add(api);
            return api;
        }

        function setAllCriteriaBusy(busy) {
            activeCriteriaForms.forEach(function (api) { api.setBusy(busy); });
        }

        // Highlight the fields the backend flagged as missing across every live form
        // (panel + modal). Accepts canonical or legacy field names; clears first so the
        // set is always exactly the current miss list.
        function highlightMissingFields(fields) {
            clearAllCriteriaErrors();
            if (!Array.isArray(fields)) return;
            activeCriteriaForms.forEach(function (api) {
                fields.forEach(function (f) { if (api.markFieldError) api.markFieldError(f); });
            });
        }
        function clearAllCriteriaErrors() {
            activeCriteriaForms.forEach(function (api) { if (api.clearFieldErrors) api.clearFieldErrors(); });
        }

        // "Search anyway" affordance: run a deterministic search from the panel form,
        // treated by the backend as explicit confirmation. Area is re-checked inside
        // submitCriteriaSearch (existing markAreaError path handles a missing area).
        function searchAnyway() {
            if (ownerPane().isProcessing || !panelFormApi) return;
            submitCriteriaSearch(panelFormApi.read(), panelFormApi);
        }

        /* --- Persistent panel --- */
        function initCriteriaPanel() {
            const body = document.getElementById('criteriaBody');
            if (!body) return;
            panelFormApi = createCriteriaForm({ variant: 'panel', onSubmit: submitCriteriaSearch, onAreasChanged: syncAreaRecoChips });
            body.appendChild(panelFormApi.form);

            const header = document.getElementById('criteriaHeader');
            if (header) {
                header.addEventListener('click', toggleCriteriaPanel);
                header.addEventListener('keydown', function (e) {
                    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggleCriteriaPanel(); }
                });
            }
            currentCriteria = defaultCriteria();
            panelFormApi.fill(currentCriteria, false);
        }

        function toggleCriteriaPanel() {
            const panel = document.getElementById('criteriaPanel');
            if (!panel) return;
            const collapsed = panel.classList.toggle('collapsed');
            const header = document.getElementById('criteriaHeader');
            if (header) header.setAttribute('aria-expanded', String(!collapsed));
        }
        function expandCriteriaPanel() {
            const panel = document.getElementById('criteriaPanel');
            if (!panel) return;
            panel.classList.remove('collapsed');
            const header = document.getElementById('criteriaHeader');
            if (header) header.setAttribute('aria-expanded', 'true');
        }
        function collapseCriteriaPanel() {
            const panel = document.getElementById('criteriaPanel');
            if (!panel) return;
            panel.classList.add('collapsed');
            const header = document.getElementById('criteriaHeader');
            if (header) header.setAttribute('aria-expanded', 'false');
        }
        function updateCriteriaPanelVisibility(view) {
            const panel = document.getElementById('criteriaPanel');
            if (!panel) return;
            panel.style.display = (view === 'favorites') ? 'none' : '';
        }

        // Update global criteria + panel from a backend response (or submitted values).
        function applyCriteria(raw) {
            const c = normalizeCriteria(raw);
            currentCriteria = c;
            if (panelFormApi) panelFormApi.fill(c, true);  // respect fields being edited
            expandCriteriaPanel();
        }

        // Reset to defaults + collapse (a new/switched conversation = fresh context).
        function resetCriteria() {
            currentCriteria = defaultCriteria();
            currentAreaRecommendations = [];   // drop nearby-area suggestions from a prior chat
            if (panelFormApi) panelFormApi.fill(currentCriteria, false);
            clearAllCriteriaErrors();   // drop any missing-field highlights from a prior chat
            collapseCriteriaPanel();
        }

        /* --- Auto-popup modal (only when backend says area is missing) --- */
        function openCriteriaModal(knownRaw) {
            // Clean any prior instance first.
            if (modalFormApi) { activeCriteriaForms.delete(modalFormApi); modalFormApi = null; }

            const overlay = document.getElementById('dialogOverlay');
            overlay.innerHTML = '';
            const card = el('div', 'dialog-card criteria-modal-card');

            const title = el('div', 'dialog-title');
            title.setAttribute('data-i18n', 'criteria_modal_title');
            title.textContent = t('criteria_modal_title');
            card.appendChild(title);

            const desc = el('div', 'dialog-message');
            desc.setAttribute('data-i18n', 'criteria_modal_desc');
            desc.textContent = t('criteria_modal_desc');
            card.appendChild(desc);

            const formApi = createCriteriaForm({ variant: 'modal', onSubmit: submitCriteriaSearch });
            card.appendChild(formApi.form);

            const cancelRow = el('div', 'criteria-modal-cancel');
            const cancelBtn = el('button', 'dialog-btn');
            cancelBtn.type = 'button';
            cancelBtn.setAttribute('data-i18n', 'cancel');
            cancelBtn.textContent = t('cancel');
            cancelBtn.addEventListener('click', closeCriteriaModal);
            cancelRow.appendChild(cancelBtn);
            card.appendChild(cancelRow);

            overlay.appendChild(card);
            overlay.style.display = 'flex';
            modalFormApi = formApi;

            formApi.fill(normalizeCriteria(knownRaw || {}), false);
            formApi.focusArea();
        }
        function closeCriteriaModal() {
            if (!modalFormApi) return;   // only act when our modal is the open dialog
            activeCriteriaForms.delete(modalFormApi);
            modalFormApi = null;
            closeDialog();
        }

        /* --- Deterministic search submit (bypasses the LLM) --- */
        async function submitCriteriaSearch(criteria, sourceApi) {
            // The criteria panel drives the pane that owns the shared results surface.
            const pane = ownerPane();
            if (pane.isProcessing) return;        // never race with chat send / another submit
            // Multi-area: send `areas` plus `area` = areas[0] for back-compat.
            const areas = (criteria && Array.isArray(criteria.areas) && criteria.areas.length)
                ? dedupeAreas(criteria.areas)
                : (criteria && criteria.area ? [criteria.area] : []);
            // Area is required UNLESS a commute destination is set (commute-only search).
            const hasCommute = criteria && !criteria.no_commute
                && !!(criteria.commute_destination && criteria.commute_destination.trim());
            if (!criteria || (!areas.length && !hasCommute)) {
                if (sourceApi) { sourceApi.markAreaError(); sourceApi.focusArea(); }
                showToast(t('criteria_area_required'), 'error');
                return;
            }

            // Compose the request body per the /api/search_direct contract.
            const reqCriteria = { no_commute: !!criteria.no_commute };
            if (areas.length) {
                reqCriteria.area = areas[0];    // legacy single-area field
                reqCriteria.areas = areas;      // multi-area list
            }
            if (criteria.max_budget != null) {
                reqCriteria.max_budget = criteria.max_budget;
                reqCriteria.budget_period = criteria.budget_period || 'month';
            }
            if (criteria.bedrooms != null) reqCriteria.bedrooms = criteria.bedrooms;
            if (criteria.room_type) reqCriteria.room_type = criteria.room_type;
            if (!criteria.no_commute) {
                if (criteria.commute_destination) reqCriteria.commute_destination = criteria.commute_destination;
                if (criteria.max_commute_time != null) reqCriteria.max_commute_time = criteria.max_commute_time;
            }
            // Move-in date: only send a well-formed ISO value (backend 400s on junk);
            // omit the key entirely when unset.
            if (criteria.move_in_date && /^\d{4}-\d{2}-\d{2}$/.test(criteria.move_in_date)) {
                reqCriteria.move_in_date = criteria.move_in_date;
            }
            const body = { criteria: reqCriteria, ui_language: currentLang };
            if (pane.conversationId) body.conversation_id = pane.conversationId;

            pane.isProcessing = true;
            setProcessingUI(pane, true);
            setAllCriteriaBusy(true);

            const userMsgEl = addMessage(pane, summarizeCriteria(criteria), 'user');
            showTypingIndicator(pane);

            try {
                const response = await apiFetch('/api/search_direct', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                removeTypingIndicator(pane);

                if (!response.ok) {
                    let errMsg = t('error_connection');
                    try { const ed = await response.json(); if (ed && ed.error) errMsg = ed.error; } catch (_) {}
                    addMessage(pane, errMsg, 'alex', { icon: 'error' });
                    pane.lastResponseType = 'error';
                    showToast(errMsg, 'error');
                } else {
                    const data = await response.json();
                    if (data.conversation_id) adoptConversationId(data.conversation_id, pane);
                    const turnId = (data.turn_id != null) ? data.turn_id : null;
                    if (turnId != null && userMsgEl) tagUserTurn(pane, userMsgEl, turnId);

                    if (data.response_type === 'error') {
                        addMessage(pane, cleanRawResponse(data.message || t('error_connection')), 'alex', { icon: 'error', turnId: turnId });
                        pane.lastResponseType = 'error';
                    } else {
                        addMessage(pane, cleanRawResponse(data.message || ''), 'alex', { turnId: turnId });
                        const recs = Array.isArray(data.recommendations) ? data.recommendations : [];
                        pane.lastResponseType = 'search';
                        if (recs.length) {
                            paintResults(pane, recs, data.area_recommendations);
                        } else {
                            paintResults(pane, [], data.area_recommendations);   // empty state on the Search tab
                            showToast(t('criteria_search_empty_hint'), null, {
                                label: t('criteria_edit_action'),
                                onClick: expandCriteriaPanel
                            });
                        }
                        // Keep the full multi-area selection even if the backend echoes
                        // only a single `area` (the `areas` echo is optional per contract).
                        const echoed = Object.assign({}, data.search_criteria || criteria);
                        if ((!Array.isArray(echoed.areas) || !echoed.areas.length) && areas.length) {
                            echoed.areas = areas;
                        }
                        applyCriteria(echoed);
                        closeCriteriaModal();     // no-op if the search came from the panel
                    }
                    loadConversations(true);
                }
            } catch (error) {
                removeTypingIndicator(pane);
                if (error && error.name === 'AbortError') {
                    // silent — user navigated / cancelled
                } else {
                    addMessage(pane, t('error_connection'), 'alex', { icon: 'error' });
                    pane.lastResponseType = 'error';
                    showToast(t('error_connection'), 'error');
                    console.error('search_direct error:', error);
                }
            } finally {
                pane.isProcessing = false;
                setProcessingUI(pane, false);
                setAllCriteriaBusy(false);
            }
        }

        /* -------------------------------------------------------------------------- */
        /* MOBILE SIDEBAR                                                             */
        /* -------------------------------------------------------------------------- */
        function toggleSidebar() {
            const sidebar = document.getElementById('convSidebar');
            const backdrop = document.getElementById('sidebarBackdrop');
            const open = sidebar.classList.toggle('open');
            backdrop.classList.toggle('open', open);
        }
        function closeSidebarMobile() {
            if (window.innerWidth <= 1024) {
                document.getElementById('convSidebar').classList.remove('open');
                document.getElementById('sidebarBackdrop').classList.remove('open');
            }
        }

        /* -------------------------------------------------------------------------- */
        /* INITIALIZATION                                                             */
        /* -------------------------------------------------------------------------- */
        // Build the main pane by wrapping the static chat DOM. Must run before any code
        // that touches a pane (setLanguage / criteria / conversations).
        function initMainPane() {
            mainPane = new ChatPane({
                id: 'main',
                root: document.getElementById('mainChatPane'),
                messagesEl: document.getElementById('chatMessages'),
                inputEl: document.getElementById('chatInput'),
                sendBtnEl: document.getElementById('sendBtn'),
                focusIndicatorEl: document.getElementById('propertyFocusIndicator'),
                quickActionsEl: document.getElementById('quickActions')
            });
            activePane = mainPane;
            resultsOwnerPane = mainPane;
            wirePaneActivation(mainPane);
        }

        // Split-screen needs a wide viewport; drop below the threshold => collapse to single.
        function handleViewportResize() {
            hideDropOverlay();
            if (splitMode && window.innerWidth < 800) closeSecondaryPane();
        }

        function wireEvents() {
            // Language
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.addEventListener('click', () => setLanguage(btn.getAttribute('data-lang')));
            });
            // Send / cancel (main pane; the secondary pane wires its own button)
            document.getElementById('sendBtn').addEventListener('click', () => onSendButtonClick(mainPane));
            // Sidebar / conversations
            document.getElementById('newChatBtn').addEventListener('click', () => newChat(mainPane));
            document.getElementById('menuToggle').addEventListener('click', toggleSidebar);
            document.getElementById('sidebarBackdrop').addEventListener('click', closeSidebarMobile);
            window.addEventListener('resize', handleViewportResize);
            // User menu
            document.getElementById('userMenuBtn').addEventListener('click', e => { e.stopPropagation(); toggleUserDropdown(); });
            document.getElementById('renameUserBtn').addEventListener('click', promptRenameUser);
            document.getElementById('switchUserBtn').addEventListener('click', switchUser);
            document.getElementById('forgetMeBtn').addEventListener('click', forgetMe);
            document.getElementById('loginBtn').addEventListener('click', () => openAuthDialog('login'));
            document.getElementById('logoutBtn').addEventListener('click', doLogout);
            // Close dropdown / dialog on outside interaction
            document.addEventListener('click', e => {
                if (!e.target.closest('#userMenuBtn') && !e.target.closest('#userDropdown')) {
                    closeUserDropdown();
                }
            });
            document.getElementById('dialogOverlay').addEventListener('click', e => {
                if (e.target === document.getElementById('dialogOverlay')) closeDialog();
            });
            document.getElementById('mapModal').addEventListener('click', e => {
                if (e.target === document.getElementById('mapModal')) closeMapModal();
            });
            document.addEventListener('keydown', e => {
                if (e.key === 'Escape') {
                    closeDialog();
                    closeUserDropdown();
                    if (document.getElementById('imageModal').style.display === 'flex') closeModal();
                    if (document.getElementById('mapModal').style.display === 'flex') closeMapModal();
                }
            });
        }

        async function initApp() {
            ensureIdentity();
            initMainPane();               // wrap the static chat DOM into the main ChatPane
            wireEvents();
            initCriteriaPanel();          // build the persistent criteria form before i18n
            setLanguage('en');            // default language + static strings + welcome
            updateUserNameLabel();

            // Sync to the authoritative server session BEFORE loading any per-user data,
            // so a logged-in user's conversations/favorites load under their account id.
            await refreshAuthState();
            loadViewedProperties();

            await loadConversations(true);

            let target = null;
            if (bootConversationId) target = conversations.find(c => c.id === bootConversationId);
            if (!target && conversations.length) target = conversations[0];

            if (target) {
                await switchConversation(mainPane, target.id);
            } else {
                startBlankConversation(mainPane);
            }

            // Load favorites (updates the Saved count without hijacking the results panel).
            await fetchFavorites();
        }

        initApp();
    </script>
</body>
</html>
