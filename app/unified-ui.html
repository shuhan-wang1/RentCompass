        // --- ReAct 过滤函数：清洗模型思维链 ---
        function cleanRawResponse(text) {
            if (!text) return "";

            if (text.trim().startsWith('{')) {
                try {
                    const jsonData = JSON.parse(text.trim());
                    const possibleKeys = ['answer', 'response', 'response_text', 'message', 'text', 'content', 'result'];
                    for (const key of possibleKeys) {
                        if (jsonData[key] && typeof jsonData[key] === 'string') {
                            text = jsonData[key];
                            break;
                        }
                    }
                    if (text.trim().startsWith('{')) {
                        const values = Object.values(jsonData);
                        const stringValue = values.find(v => typeof v === 'string' && v.length > 20);
                        if (stringValue) {
                            text = stringValue;
                        }
                    }
                } catch (e) {
                    const partialMatch = text.match(/"(?:answer|response|message|text)"\s*:\s*"([^"]+)/i);
                    if (partialMatch && partialMatch[1]) {
                        text = partialMatch[1];
                    }
                }
            }

            text = text.replace(/^\s*\*\*Final Answer:\*\*\s*/i, '');
            text = text.replace(/^\s*\*\*Final Answer:\s*/i, '');
            text = text.replace(/^\s*Final Answer:\s*/i, '');

            if (text.startsWith('**') && !text.startsWith('**#')) {
                if (text === '**' || text === '** ') {
                    text = '';
                }
            }

            const finalAnswerRegex = /Final Answer:\s*([\s\S]+)/i;
            const match = text.match(finalAnswerRegex);
            if (match && match[1]) {
                return match[1].trim();
            }

            let cleanText = text;
            cleanText = cleanText.replace(/Thought:[\s\S]*?(?=(Final Answer:|Action:|Observation:|$))/gi, "");
            cleanText = cleanText.replace(/Action:[\s\S]*?(?=(Final Answer:|Observation:|$))/gi, "");
            cleanText = cleanText.replace(/Observation:[\s\S]*?(?=(Final Answer:|Thought:|$))/gi, "");
            cleanText = cleanText.replace(/(Thought|Action|Action Input|Observation):/gi, "");

            return cleanText.trim();
        }

        /* -------------------------------------------------------------------------- */
        /* MARKDOWN -> HTML (escape-by-default; NO svg passthrough)                    */
        /* Everything is HTML-escaped first; only trusted structural markup and       */
        /* validated links are re-introduced afterwards.                              */
        /* -------------------------------------------------------------------------- */
        function formatMessage(text) {
            if (!text) return '';
            let src = String(text);

            // 1) Pull markdown links out so we can rebuild them safely later.
            const links = [];
            src = src.replace(/\[([^\]]+)\]\(([^)]+)\)/g, function (m, txt, url) {
                const idx = links.length;
                links.push({ text: txt, url: url });
                return '%%LINK' + idx + '%%';
            });

            // 2) Escape ALL html-significant characters.
            let html = src.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

            // 3) Structural markdown (operates on already-escaped text).
            html = html.replace(/^\s*(---+|\*\*\*+|___+)\s*$/gm, '<hr style="border:none;border-top:1px solid #e5e7eb;margin:16px 0;">');
            html = html.replace(/^###### (.+)$/gm, '<h6 style="font-size:0.85rem;font-weight:600;margin:8px 0 4px 0;color:#374151;">$1</h6>');
            html = html.replace(/^##### (.+)$/gm, '<h5 style="font-size:0.9rem;font-weight:600;margin:8px 0 4px 0;color:#374151;">$1</h5>');
            html = html.replace(/^#### (.+)$/gm, '<h4 style="font-size:0.95rem;font-weight:600;margin:10px 0 6px 0;color:#1f2937;">$1</h4>');
            html = html.replace(/^### (.+)$/gm, '<h4>$1</h4>');
            html = html.replace(/^## (.+)$/gm, '<h3>$1</h3>');
            html = html.replace(/^# (.+)$/gm, '<h2>$1</h2>');

            html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
            html = html.replace(/`([^`]+)`/g, '<code style="background:#f3f4f6;padding:2px 6px;border-radius:4px;font-size:0.9em;">$1</code>');

            // 4) Tables.
            const lines = html.split('\n');
            const tables = [];
            let i = 0;
            while (i < lines.length) {
                const line = lines[i];
                if (line.trim().startsWith('|') && line.trim().endsWith('|') && i + 1 < lines.length) {
                    const nextLine = lines[i + 1];
                    if (nextLine.trim().startsWith('|') && /^[\|\s\-:]+$/.test(nextLine.trim())) {
                        const headerLine = line;
                        const headers = headerLine.split('|').map(h => h.trim()).filter(h => h);
                        const rows = [];
                        let j = i + 2;
                        while (j < lines.length && lines[j].trim().startsWith('|') && /^[\|\s\-:]/.test(lines[j].trim())) {
                            const cells = lines[j].split('|').map(cell => cell.trim()).filter(cell => cell);
                            if (cells.length > 0) rows.push(cells);
                            j++;
                        }
                        let tableHtml = '<table style="width:100%;border-collapse:collapse;margin:12px 0;border:1px solid #ddd;">';
                        tableHtml += '<thead><tr style="background:#f3f4f6;border-bottom:2px solid #e5e7eb;">';
                        headers.forEach(header => {
                            tableHtml += '<th style="padding:10px;text-align:left;font-weight:600;border-right:1px solid #ddd;">' + header + '</th>';
                        });
                        tableHtml += '</tr></thead><tbody>';
                        rows.forEach((row, idx) => {
                            const bgColor = idx % 2 === 0 ? 'white' : '#fafbfc';
                            tableHtml += '<tr style="background:' + bgColor + ';border-bottom:1px solid #ddd;">';
                            row.forEach(cell => {
                                tableHtml += '<td style="padding:10px;border-right:1px solid #ddd;">' + cell + '</td>';
                            });
                            tableHtml += '</tr>';
                        });
                        tableHtml += '</tbody></table>';
                        tables.push({ startIdx: i, endIdx: j - 1, html: tableHtml });
                        i = j;
                        continue;
                    }
                }
                i++;
            }
            for (let idx = tables.length - 1; idx >= 0; idx--) {
                const table = tables[idx];
                lines.splice(table.startIdx, table.endIdx - table.startIdx + 1, '%%TABLE' + idx + '%%');
            }
            html = lines.join('\n');

            // 5) Lists / paragraphs.
            const linesList = html.split('\n');
            let output = [];
            let inUl = false;
            let inOl = false;
            linesList.forEach((line, lineIdx) => {
                const trimmedLine = line.trim();
                if (trimmedLine.match(/^[-*]\s+/) && !trimmedLine.startsWith('|')) {
                    if (inOl) { output.push('</ol>'); inOl = false; }
                    if (!inUl) { output.push('<ul>'); inUl = true; }
                    output.push('<li>' + trimmedLine.replace(/^[-*]\s+/, '') + '</li>');
                } else if (trimmedLine.match(/^\d+[\.\)]\s+/) && !trimmedLine.startsWith('|')) {
                    if (inUl) { output.push('</ul>'); inUl = false; }
                    const prevLine = lineIdx > 0 ? linesList[lineIdx - 1].trim() : '';
                    const isPrevListItem = prevLine.match(/^[-*\d+][\.\)\s]/) || inOl;
                    if (!inOl || !isPrevListItem) {
                        if (inOl) { output.push('</ol>'); }
                        output.push('<ol>');
                        inOl = true;
                    }
                    const itemContent = trimmedLine.replace(/^\d+[\.\)]\s+/, '');
                    output.push('<li>' + itemContent + '</li>');
                } else {
                    if (inUl) { output.push('</ul>'); inUl = false; }
                    if (inOl) { output.push('</ol>'); inOl = false; }
                    if (trimmedLine) {
                        output.push('<p>' + line + '</p>');
                    }
                }
            });
            if (inUl) output.push('</ul>');
            if (inOl) output.push('</ol>');
            html = output.join('');

            // 6) Restore tables.
            tables.forEach((table, idx) => {
                const placeholder = '%%TABLE' + idx + '%%';
                html = html.replace('<p>' + placeholder + '</p>', table.html);
                html = html.split(placeholder).join(table.html);
            });

            // 7) Restore links with escaped text + validated href.
            links.forEach((link, idx) => {
                const safe = isSafeHref(link.url) ? link.url : '#';
                const a = '<a href="' + escapeHtml(safe) + '" target="_blank" rel="noopener noreferrer" style="color:var(--primary-color);text-decoration:underline;">' + escapeHtml(link.text) + '</a>';
                html = html.split('%%LINK' + idx + '%%').join(a);
            });

            return html;
        }

        /* -------------------------------------------------------------------------- */
        /* TOASTS                                                                     */
        /* -------------------------------------------------------------------------- */
        function showToast(message, type, action) {
            const container = document.getElementById('toastContainer');
            const toast = el('div', 'toast' + (type ? ' toast-' + type : ''));
            const span = document.createElement('span');
            span.textContent = message;
            toast.appendChild(span);
            if (action && action.label) {
                const btn = el('button', 'toast-action');
                btn.textContent = action.label;
                btn.addEventListener('click', () => {
                    removeToast(toast);
                    if (typeof action.onClick === 'function') action.onClick();
                });
                toast.appendChild(btn);
            }
            container.appendChild(toast);
            const ttl = action ? 9000 : 4500;
            setTimeout(() => removeToast(toast), ttl);
        }
        function removeToast(toast) {
            if (!toast || !toast.parentNode) return;
            toast.classList.add('toast-hide');
            setTimeout(() => { if (toast.parentNode) toast.remove(); }, 300);
        }

        /* -------------------------------------------------------------------------- */
        /* REUSABLE DIALOG                                                            */
        /* -------------------------------------------------------------------------- */
        function openDialog(opts) {
            const overlay = document.getElementById('dialogOverlay');
            overlay.innerHTML = '';
            const card = el('div', 'dialog-card');

            const title = el('div', 'dialog-title');
            title.textContent = opts.title || '';
            card.appendChild(title);

            if (opts.message) {
                const msg = el('div', 'dialog-message');
                msg.textContent = opts.message;
                card.appendChild(msg);
            }

            let input = null;
            if (opts.withInput) {
                input = el('input', 'dialog-input');
                input.type = 'text';
                input.value = opts.defaultValue || '';
                input.placeholder = opts.placeholder || '';
                input.setAttribute('maxlength', '120');
                card.appendChild(input);
            }

            const actions = el('div', 'dialog-actions');
            const cancel = el('button', 'dialog-btn');
            cancel.textContent = opts.cancelLabel || t('cancel');
            cancel.addEventListener('click', closeDialog);

            const confirm = el('button', 'dialog-btn primary');
            confirm.textContent = opts.confirmLabel || t('confirm');
            const doConfirm = () => {
                const val = input ? input.value.trim() : null;
                if (opts.withInput && !val) { input.focus(); return; }
                closeDialog();
                if (typeof opts.onConfirm === 'function') opts.onConfirm(val);
            };
            confirm.addEventListener('click', doConfirm);

            actions.appendChild(cancel);
            actions.appendChild(confirm);
            card.appendChild(actions);

            overlay.appendChild(card);
            overlay.style.display = 'flex';

            if (input) {
                input.focus();
                input.select();
                input.addEventListener('keydown', e => {
                    if (e.key === 'Enter') { e.preventDefault(); doConfirm(); }
                });
            }
        }
        function closeDialog() {
            const overlay = document.getElementById('dialogOverlay');
            overlay.style.display = 'none';
            overlay.innerHTML = '';
            // If the criteria modal was the open dialog, drop its form instance so it
            // no longer participates in busy toggling (Escape / outside-click path).
            if (modalFormApi) { activeCriteriaForms.delete(modalFormApi); modalFormApi = null; }
        }

        /* -------------------------------------------------------------------------- */
        /* CHAT — SEND / CANCEL                                                        */
        /* -------------------------------------------------------------------------- */
        function setProcessingUI(pane, processing) {
            const btn = pane && pane.sendBtnEl;
            if (!btn) return;
            if (processing) {
                btn.classList.add('is-stop');
                btn.innerHTML = getIcon('stop');
                btn.setAttribute('aria-label', t('cancel'));
                btn.title = t('cancel');
            } else {
                btn.classList.remove('is-stop');
                btn.innerHTML = getIcon('send');
                btn.setAttribute('aria-label', t('send'));
                btn.title = t('send');
            }
        }

        function cancelRequest(pane) {
            if (pane && pane.activeController) pane.activeController.abort();
        }

        function onSendButtonClick(pane) {
            pane = pane || mainPane;
            if (pane.isProcessing) cancelRequest(pane);
            else sendMessage(pane);
        }

        function showRetryToast(pane) {
            showToast(t('error_connection'), 'error', {
                label: t('retry'),
                onClick: () => {
                    pane.inputEl.value = pane.lastUserMessage;
                    sendMessage(pane);
                }
            });
        }

        function adoptConversationId(cid, pane) {
            if (!cid || cid === pane.conversationId) return;
            pane.conversationId = cid;
            if (pane === mainPane) persistMainConversation();
        }

        // Paint the shared results/criteria panel from a pane's produced results and
        // mark that pane as the panel's owner (drives Ask-AI / criteria submit target).
        function paintResults(pane, recs, areaRecos) {
            pane.results = Array.isArray(recs) ? recs : [];
            pane.areaRecos = Array.isArray(areaRecos) ? areaRecos : [];
            resultsOwnerPane = pane;
            currentResults = pane.results;
            currentAreaRecommendations = pane.areaRecos;
            displayResults(currentResults);
        }

        // overrideText: used by the edit-turn flow to send the edited message text
        // (bypasses the pane input which the user has since cleared).
        async function sendMessage(pane, overrideText) {
            pane = pane || mainPane;
            const input = pane.inputEl;
            const message = (overrideText != null ? overrideText : input.value).trim();
            if (!message || pane.isProcessing) return;

            setActivePane(pane);
            pane.lastUserMessage = message;
            pane.isProcessing = true;
            setProcessingUI(pane, true);

            const userMsgEl = addMessage(pane, message, 'user');
            input.value = '';
            input.style.height = 'auto';
            showTypingIndicator(pane);

            pane.activeController = new AbortController();

            try {
                const isContinuation = pane.lastResponseType === 'clarification';
                // 聚焦栈载荷：focus_stack 顺序为旧→新，末位=当前聚焦。
                // property 保留向后兼容 = 栈顶（末位）；栈空时两者都不传。
                const context = { viewed_properties: viewedProperties };
                if (pane.focusStack.length) {
                    context.focus_stack = pane.focusStack.slice();
                    context.property = pane.focusStack[pane.focusStack.length - 1];
                }
                const body = {
                    message: message,
                    context: context,
                    is_continuation: isContinuation,
                    language: currentLang,
                    ui_language: currentLang
                };
                if (pane.conversationId) body.conversation_id = pane.conversationId;

                const response = await apiFetch('/api/alex', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                    signal: pane.activeController.signal
                });

                removeTypingIndicator(pane);

                if (!response.ok) {
                    let errMsg = t('error_connection');
                    try { const ed = await response.json(); if (ed && ed.error) errMsg = ed.error; } catch (_) {}
                    addMessage(pane, errMsg, 'alex', { icon: 'error' });
                    pane.lastResponseType = 'error';
                    showRetryToast(pane);
                } else {
                    const data = await response.json();
                    if (data.conversation_id) adoptConversationId(data.conversation_id, pane);
                    // turn_id tags both the user bubble (edit/version) and the assistant
                    // bubble (fork "Branch from here"); absent → no such affordance.
                    const turnId = (data.turn_id != null) ? data.turn_id : null;
                    if (turnId != null && userMsgEl) tagUserTurn(pane, userMsgEl, turnId);

                    if (data.error) {
                        addMessage(pane, cleanRawResponse(String(data.error)), 'alex', { icon: 'error', turnId: turnId });
                        pane.lastResponseType = 'error';
                    } else if (data.response_type === 'clarification') {
                        addMessage(pane, cleanRawResponse(data.message), 'alex', { icon: 'question', turnId: turnId });
                        pane.lastResponseType = 'clarification';
                        const missing = Array.isArray(data.missing_fields) ? data.missing_fields : [];
                        // Optional fields the gate merely mentions (e.g. 'move_in') —
                        // highlighted like the recommended ones, but they never drive
                        // the modal/soft-gate logic below.
                        const missingOptional = Array.isArray(data.missing_optional_fields) ? data.missing_optional_fields : [];
                        // Keep the panel in sync with whatever the backend already knows
                        // (applyCriteria also expands the panel).
                        if (data.known_criteria || missing.length) applyCriteria(data.known_criteria || {});
                        const areaMissing = missing.indexOf('area') !== -1;
                        // Only auto-popup the structured form when Area (the one required
                        // field) is missing — not for address/safety/other clarifications.
                        if (areaMissing) openCriteriaModal(data.known_criteria || {});
                        // Highlight after the modal exists so BOTH panel + modal get marked.
                        if (missing.length || missingOptional.length) highlightMissingFields(missing.concat(missingOptional));
                        // Soft-criteria clarification (or the heuristic fallback when the
                        // backend omits clarification_kind): let the user proceed anyway.
                        const isSoft = data.clarification_kind === 'soft_criteria' ||
                            (!data.clarification_kind && missing.length > 0 && !areaMissing);
                        if (isSoft) {
                            showToast(t('criteria_missing_hint'), null, {
                                label: t('criteria_search_anyway'),
                                onClick: searchAnyway
                            });
                        }
                    } else if (data.response_type === 'search' && data.recommendations) {
                        addMessage(pane, cleanRawResponse(data.message || ''), 'alex', { turnId: turnId });
                        paintResults(pane, data.recommendations, data.area_recommendations);
                        pane.lastResponseType = 'search';
                        if (data.search_criteria) applyCriteria(data.search_criteria);
                    } else if (data.response_type === 'error') {
                        addMessage(pane, cleanRawResponse(data.message || t('error_connection')), 'alex', { icon: 'error', turnId: turnId });
                        pane.lastResponseType = 'error';
                    } else {
                        const rawText = data.message || data.response || t('error_connection');
                        addMessage(pane, cleanRawResponse(rawText), 'alex', { turnId: turnId });
                        if (data.recommendations && data.recommendations.length > 0) {
                            paintResults(pane, data.recommendations, data.area_recommendations);
                            pane.lastResponseType = 'search';
                        } else {
                            pane.lastResponseType = 'answer';
                        }
                        if (data.search_criteria) applyCriteria(data.search_criteria);
                    }
                    // Refresh the sidebar ordering / updated_at (and pick up an
                    // implicitly-created conversation).
                    loadConversations(true);
                }
            } catch (error) {
                removeTypingIndicator(pane);
                if (error && error.name === 'AbortError') {
                    addMessage(pane, t('request_cancelled'), 'alex', { icon: 'error' });
                    pane.lastResponseType = null;
                } else {
                    addMessage(pane, t('error_connection'), 'alex', { icon: 'error' });
                    pane.lastResponseType = 'error';
                    showRetryToast(pane);
                    console.error('Error:', error);
                }
            } finally {
                pane.isProcessing = false;
                pane.activeController = null;
                setProcessingUI(pane, false);
                if (window.innerWidth > 1024) input.focus();
            }
        }

        function sendQuickMessage(text, pane) {
            pane = pane || activePane || mainPane;
            if (pane.isProcessing) return;
            pane.inputEl.value = text;
            autoResize(pane.inputEl);
            sendMessage(pane);
        }

        /* -------------------------------------------------------------------------- */
        /* MESSAGE RENDERING                                                          */
        /* opts.icon = trusted local icon name prepended to the (escaped) bubble.     */
        /* Returns the message element so callers can backfill a turn_id later.       */
        /* -------------------------------------------------------------------------- */
        function addMessage(pane, text, sender, opts) {
            opts = opts || {};
            pane.showingWelcome = false;

            const messagesDiv = pane.messagesEl;
            const messageDiv = el('div', 'message ' + sender);

            if (sender === 'alex') {
                const senderEl = el('div', 'sender');
                senderEl.textContent = t('brand');
                const bubble = el('div', 'bubble');
                // Local icon (trusted) + escaped/formatted message body.
                let inner = '';
                if (opts.icon) inner += getIcon(opts.icon, 'icon-sm') + ' ';
                inner += formatMessage(text);
                bubble.innerHTML = inner;
                messageDiv.appendChild(senderEl);
                messageDiv.appendChild(bubble);
                // Per-message fork affordance. Only shown when the turn is known and we
                // are inside a saved conversation (fork targets a stored conversation).
                if (opts.turnId != null && opts.turnId !== '' && pane.conversationId) {
                    const sourceCid = pane.conversationId;
                    const turnId = opts.turnId;
                    const actions = el('div', 'message-actions');
                    const branchBtn = el('button', 'msg-branch-btn');
                    branchBtn.type = 'button';
                    branchBtn.title = t('branch_from_here');
                    branchBtn.setAttribute('aria-label', t('branch_from_here'));
                    branchBtn.innerHTML = getIcon('branch', 'icon-sm') +
                        '<span>' + escapeHtml(t('branch_from_here')) + '</span>';
                    branchBtn.addEventListener('click', () => forkConversation(sourceCid, turnId, branchBtn, pane));
                    actions.appendChild(branchBtn);
                    messageDiv.appendChild(actions);
                }
            } else {
                const bubble = el('div', 'bubble');
                bubble.textContent = text; // user echo — escaped by textContent
                messageDiv.appendChild(bubble);
                messageDiv._rawText = text;   // original text, reused by the edit box
                if (opts.turnId != null && opts.turnId !== '') tagUserTurn(pane, messageDiv, opts.turnId);
            }

            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            return messageDiv;
        }

        // Attach a turn_id to a user bubble → reveals the hover "Edit" affordance and
        // makes the bubble eligible for a version switcher. Idempotent (safe to re-tag
        // a live bubble once the response returns its turn_id).
        function tagUserTurn(pane, messageDiv, turnId) {
            if (!messageDiv || messageDiv.classList.contains('user') === false) return;
            messageDiv.dataset.turnId = String(turnId);
            if (!messageDiv.querySelector('.user-msg-actions')) {
                const actions = el('div', 'user-msg-actions');
                const editBtn = el('button', 'msg-edit-btn');
                editBtn.type = 'button';
                editBtn.title = t('edit_message');
                editBtn.setAttribute('aria-label', t('edit_message'));
                editBtn.innerHTML = getIcon('edit', 'icon-sm') + '<span>' + escapeHtml(t('edit_message')) + '</span>';
                editBtn.addEventListener('click', () => enterEditMode(pane, messageDiv));
                actions.appendChild(editBtn);
                messageDiv.appendChild(actions);
            }
            renderVersionSwitcher(pane, messageDiv);
        }

        function showTypingIndicator(pane) {
            const messagesDiv = pane.messagesEl;
            const indicator = el('div', 'message alex');
            const senderEl = el('div', 'sender');
            senderEl.textContent = t('brand');
            const bubble = el('div', 'bubble');
            bubble.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
            indicator.appendChild(senderEl);
            indicator.appendChild(bubble);
            messagesDiv.appendChild(indicator);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            pane.typingEl = indicator;
        }

        function removeTypingIndicator(pane) {
            if (pane && pane.typingEl) { pane.typingEl.remove(); pane.typingEl = null; }
        }

        /* -------------------------------------------------------------------------- */
        /* EDIT USER MESSAGE + VERSION SWITCHING (ChatGPT-style)                      */
        /* Editing a user turn creates a new branch (edit_turn) that inherits the      */
        /* context BEFORE that turn; the pane then sends the edited text normally.     */
        /* Sibling branches sharing a turn slot show a ‹ k/n › switcher.               */
        /* -------------------------------------------------------------------------- */
        function conversationTitle(cid) {
            const c = conversations.find(x => x.id === cid);
            return (c && c.title) ? c.title : t('untitled_chat');
        }

        // Turn a user bubble into an inline editor (textarea + Save/Cancel).
        function enterEditMode(pane, messageDiv) {
            if (anyPaneProcessing()) return;                 // never edit while a request is in flight
            if (messageDiv.dataset.editing === '1') return;  // already editing this bubble
            const cid = pane.conversationId;
            const turnId = messageDiv.dataset.turnId;
            if (!cid || turnId == null) return;              // edit needs a saved conversation + known turn
            messageDiv.dataset.editing = '1';

            const bubbleEl = messageDiv.querySelector('.bubble');
            const original = (messageDiv._rawText != null) ? messageDiv._rawText : (bubbleEl ? bubbleEl.textContent : '');
            // Hide the existing bubble/actions/switcher; restore them on cancel.
            const prevChildren = Array.from(messageDiv.children);
            prevChildren.forEach(n => { n.style.display = 'none'; });

            const box = el('div', 'msg-edit-box');
            const ta = el('textarea', 'msg-edit-textarea');
            ta.value = original;
            const row = el('div', 'msg-edit-row');
            const hint = el('span', 'msg-edit-hint');
            hint.textContent = t('edit_hint');
            const cancelBtn = el('button', 'msg-edit-action');
            cancelBtn.type = 'button';
            cancelBtn.textContent = t('edit_cancel');
            const saveBtn = el('button', 'msg-edit-action primary');
            saveBtn.type = 'button';
            saveBtn.textContent = t('edit_save');
            row.appendChild(hint); row.appendChild(cancelBtn); row.appendChild(saveBtn);
            box.appendChild(ta); box.appendChild(row);
            messageDiv.appendChild(box);

            function cleanup() {
                box.remove();
                prevChildren.forEach(n => { n.style.display = ''; });
                delete messageDiv.dataset.editing;
            }
            function doSave() {
                const val = ta.value.trim();
                if (!val) { ta.focus(); return; }
                cleanup();
                editUserTurn(pane, cid, turnId, val);
            }
            cancelBtn.addEventListener('click', cleanup);
            saveBtn.addEventListener('click', doSave);
            ta.addEventListener('keydown', e => {
                if (e.key === 'Escape') { e.preventDefault(); cleanup(); }
                else if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); doSave(); }
            });
            ta.focus();
            ta.setSelectionRange(ta.value.length, ta.value.length);
        }

        // Create the edit branch, switch this pane to it, then send the edited text.
        async function editUserTurn(pane, sourceCid, turnId, text) {
            if (pane.isProcessing) return;
            try {
                const response = await apiFetch('/api/conversations/' + encodeURIComponent(sourceCid) + '/edit_turn', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Idempotency-Key': uuidHex() },
                    body: JSON.stringify({ turn_id: turnId })
                });
                if (!response.ok) { showToast(t('error_edit_turn'), 'error'); return; }
                const data = await response.json();
                const conv = (data && data.conversation) ? data.conversation : data;
                if (!conv || !conv.id) { showToast(t('error_edit_turn'), 'error'); return; }
                await loadConversations(true);
                await switchConversation(pane, conv.id);  // load inherited (pre-turn) context
                await sendMessage(pane, text);            // send edited text down the normal pipeline
            } catch (error) {
                if (error && error.name === 'AbortError') return;
                showToast(t('error_edit_turn'), 'error');
            }
        }

        // Build a ‹ k/n › switcher for a bubble from an explicit version group.
        // group = [{conversation_id, created_at, title}...] (created_at ASC).
        function mountSwitcher(pane, messageDiv, group) {
            const existing = messageDiv.querySelector('.version-switcher');
            if (existing) existing.remove();
            const n = group.length;
            const idx = group.findIndex(v => v.conversation_id === pane.conversationId);
            const k = idx >= 0 ? idx + 1 : 1;

            const sw = el('div', 'version-switcher');
            sw.title = t('version_label').replace('{k}', k).replace('{n}', n);
            const prev = el('button');
            prev.type = 'button';
            prev.title = t('version_prev');
            prev.setAttribute('aria-label', t('version_prev'));
            prev.innerHTML = getIcon('chevronLeft', 'icon-sm');
            prev.disabled = idx <= 0;
            const count = el('span', 'version-switcher-count');
            count.textContent = t('version_of').replace('{k}', k).replace('{n}', n);
            const next = el('button');
            next.type = 'button';
            next.title = t('version_next');
            next.setAttribute('aria-label', t('version_next'));
            next.innerHTML = getIcon('chevronRight', 'icon-sm');
            next.disabled = idx < 0 || idx >= n - 1;
            prev.addEventListener('click', () => { if (idx > 0) switchConversation(pane, group[idx - 1].conversation_id); });
            next.addEventListener('click', () => { if (idx >= 0 && idx < n - 1) switchConversation(pane, group[idx + 1].conversation_id); });
            sw.appendChild(prev); sw.appendChild(count); sw.appendChild(next);
            messageDiv.appendChild(sw);
        }

        // Single-bubble direct-key render (used when a live send tags a fresh turn_id).
        function renderVersionSwitcher(pane, messageDiv) {
            const existing = messageDiv.querySelector('.version-switcher');
            if (existing) existing.remove();
            const turnId = messageDiv.dataset.turnId;
            if (turnId == null) return;
            const group = pane.versionMap && pane.versionMap[turnId];
            if (Array.isArray(group) && group.length >= 2) mountSwitcher(pane, messageDiv, group);
        }

        // Place version switchers across a whole loaded conversation.
        // Pass 1 (direct key): a user bubble whose turn_id equals a group's slot key —
        //   this is the canonical/original branch, whose turn_ids ARE the slot keys.
        // Pass 2 (fallback): on an edit branch, inherited messages carry fresh turn_ids,
        //   so the slot's first-new message never key-matches. For any group that still
        //   contains the current conversation_id, mount the switcher on the branch's first
        //   post-inheritance user message — approximated as the first user bubble not yet
        //   carrying a switcher, scanning left→right after the last placed bubble.
        function renderAllVersionSwitchers(pane) {
            const bubbles = Array.from(pane.messagesEl.querySelectorAll('.message.user'));
            bubbles.forEach(b => { const s = b.querySelector('.version-switcher'); if (s) s.remove(); });
            const groups = pane.versionMap || {};
            const placedKeys = new Set();
            const used = new Set();

            // Pass 1: direct turn_id -> slot key.
            bubbles.forEach(bubble => {
                const tid = bubble.dataset.turnId;
                if (tid != null && Array.isArray(groups[tid]) && groups[tid].length >= 2) {
                    mountSwitcher(pane, bubble, groups[tid]);
                    placedKeys.add(tid);
                    used.add(bubble);
                }
            });

            // Pass 2: fallback for groups containing this conversation but not key-matched.
            let cursor = 0;
            Object.keys(groups).forEach(key => {
                if (placedKeys.has(key)) return;
                const versions = groups[key];
                if (!Array.isArray(versions) || versions.length < 2) return;
                if (!versions.some(v => v.conversation_id === pane.conversationId)) return;
                let target = null;
                for (; cursor < bubbles.length; cursor++) {
                    if (!used.has(bubbles[cursor])) { target = bubbles[cursor]; cursor++; break; }
                }
                if (target) { mountSwitcher(pane, target, versions); used.add(target); }
            });
        }

        // Fetch the version map for a pane's conversation and render all its switchers.
        async function loadVersionMap(pane) {
            pane.versionMap = {};
            const cid = pane.conversationId;
            if (!cid) return;
            try {
                const response = await apiFetch('/api/conversations/' + encodeURIComponent(cid) + '/version_map', { method: 'GET' });
                if (!response.ok) return;
                const data = await response.json();
                pane.versionMap = (data && data.version_groups) ? data.version_groups : {};
            } catch (error) {
                pane.versionMap = {};
                return;
            }
            renderAllVersionSwitchers(pane);
        }

        /* -------------------------------------------------------------------------- */
        /* RESULTS & CARDS                                                            */
        /* -------------------------------------------------------------------------- */
        function setActiveTab(view) {
            document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
            const id = view === 'favorites' ? 'btn-favorites' : 'btn-results';
            const btn = document.getElementById(id);
            if (btn) btn.classList.add('active');
            updateCriteriaPanelVisibility(view);
        }
        function favoritesTabActive() {
            const b = document.getElementById('btn-favorites');
            return !!(b && b.classList.contains('active'));
        }

        function buildEmptyState(iconName, title, desc) {
            const wrap = el('div', 'empty-state');
            const ic = el('div', 'empty-state-icon');
            ic.innerHTML = getIcon(iconName, 'icon-lg');
            const h = document.createElement('h3');
            h.textContent = title;
            const p = document.createElement('p');
            p.textContent = desc;
            wrap.appendChild(ic);
            wrap.appendChild(h);
            wrap.appendChild(p);
            return wrap;
        }

        function buildSimilarAlert() {
            const box = el('div', 'alert-box alert-warning');
            box.innerHTML = getIcon('warning');
            const div = document.createElement('div');
            const strong = document.createElement('strong');
            strong.style.cssText = 'display:block;margin-bottom:2px;';
            strong.textContent = t('similar_alert_title');
            const span = document.createElement('span');
            span.style.fontSize = '0.9em';
            span.textContent = t('similar_alert_desc');
            div.appendChild(strong);
            div.appendChild(span);
            box.appendChild(div);
            return box;
        }

        function displayResults(recommendations) {
            setActiveTab('results');
            const content = document.getElementById('resultsContent');
            content.innerHTML = '';

            // Recommended nearby areas (rendered even on an empty result set — they give
            // the user a next step when the current area returned nothing).
            const recoRow = buildAreaRecommendations(currentAreaRecommendations);
            if (recoRow) content.appendChild(recoRow);

            if (!recommendations || recommendations.length === 0) {
                content.appendChild(buildEmptyState('search', t('no_results_title'), t('no_results_desc')));
                return;
            }

            if (recommendations[0] && recommendations[0].match_type === 'similar_suggestion') {
                content.appendChild(buildSimilarAlert());
            }
            recommendations.forEach(rec => content.appendChild(createPropertyCard(rec)));
        }

        // Clickable "recommended areas nearby" chips. Clicking one adds the area to the
        // current multi-area selection and fires a fresh /api/search_direct search.
        // Areas already in the selection render as selected/disabled (no dupes).
        function buildAreaRecommendations(list) {
            if (!Array.isArray(list) || list.length === 0) return null;
            const already = panelFormApi ? panelFormApi.getAreas().map(a => a.toLowerCase()) : [];

            const wrap = el('div', 'area-recos');
            const label = el('div', 'area-recos-label');
            label.innerHTML = getIcon('mapPin', 'icon-sm');   // trusted local icon
            const labelText = document.createElement('span');
            labelText.textContent = ' ' + t('area_recos_label');
            label.appendChild(labelText);
            wrap.appendChild(label);

            const chips = el('div', 'area-recos-chips');
            let rendered = 0;
            list.forEach(function (item) {
                if (!item || !item.name) return;
                const name = String(item.name);
                const chip = el('button', 'area-reco-chip');
                chip.type = 'button';
                // Normalized key so the chip's highlight can be re-derived from the
                // criteria areas on every mutation (see syncAreaRecoChips).
                chip.dataset.areaKey = name.trim().toLowerCase();
                if (item.reason) chip.title = String(item.reason);   // tooltip

                const nameEl = el('span', 'area-reco-name');
                nameEl.textContent = name;
                chip.appendChild(nameEl);

                const mins = item.commute_minutes;
                if (mins !== undefined && mins !== null && mins !== '' && !isNaN(mins)) {
                    const meta = el('span', 'area-reco-meta');
                    meta.textContent = ' · ' + mins + ' ' + t('min_short');
                    chip.appendChild(meta);
                }

                if (already.indexOf(name.toLowerCase()) !== -1) {
                    chip.classList.add('selected');
                    chip.disabled = true;
                }
                chip.addEventListener('click', function () { onRecoAreaClick(name, chip); });
                chips.appendChild(chip);
                rendered++;
            });
            if (rendered === 0) return null;
            wrap.appendChild(chips);
            return wrap;
        }

        // Single source of truth for the recommended-area chip highlight: derive it
        // straight from the criteria areas. Called on every criteria area mutation
        // (add/remove/fill) so removing an area un-highlights (and re-enables) its chip
        // immediately, with no search round-trip. Matching normalizes case so a display
        // name ("Watford") matches a stored area ("watford").
        function syncAreaRecoChips() {
            const selected = panelFormApi
                ? panelFormApi.getAreas().map(function (a) { return String(a).trim().toLowerCase(); })
                : [];
            document.querySelectorAll('.area-reco-chip').forEach(function (chip) {
                const key = chip.dataset.areaKey || '';
                const on = !!key && selected.indexOf(key) !== -1;
                chip.classList.toggle('selected', on);
                chip.disabled = on;
            });
        }

        // Add a recommended area to the selection and re-run the search (dedupe-safe).
        // The chip highlight is handled by syncAreaRecoChips via the form's onAreasChanged
        // hook, so no manual chip mutation is needed here.
        function onRecoAreaClick(name, chipEl) {
            if (ownerPane().isProcessing || !panelFormApi) return;
            const added = panelFormApi.addArea(name);
            if (!added) return;                 // was already selected — no re-search
            expandCriteriaPanel();
            submitCriteriaSearch(panelFormApi.read(), panelFormApi);
        }

        function buildBudgetBadge(rec) {
            if (!rec.budget_status) return null;
            const isOverBudget = rec.match_type === 'similar_suggestion' || rec.match_type === 'soft_violation';
            // Strip emoji/status glyphs, then map to a canonical localized label.
            let clean = String(rec.budget_status).replace(/[✅❌⚠️]/g, '').trim();
            let displayText = clean;
            let isGreen = !isOverBudget;
            const low = clean.toLowerCase();
            if (low.includes('within') || clean.includes('内') || clean.includes('OK')) {
                displayText = t('status_budget_ok');
                isGreen = true;
            } else if (low.includes('over') || clean.includes('超出') || clean.includes('High')) {
                displayText = t('status_budget_over');
                isGreen = false;
            }
            const badge = document.createElement('span');
            badge.style.cssText = 'font-size:11px;padding:2px 8px;border-radius:4px;font-weight:600;display:inline-block;'
                + (isGreen
                    ? 'background:#ecfdf5;color:#047857;border:1px solid #a7f3d0;'
                    : 'background:#fffbeb;color:#b45309;border:1px solid #fcd34d;');
            badge.textContent = displayText;
            return badge;
        }

        // Move-in line text from `available_from` (always shown on a card so the
        // tenancy start is never hidden). Returns a localized string for textContent.
        //   "YYYY-MM-DD" -> "Move-in from 2025-08-01" / "2025-08-01 起可入住"
        //   "Available now" -> t('avail_now')
        //   ""/absent -> t('avail_unknown')  ("…contact agent")
        function availabilityText(rec) {
            const raw = (rec && typeof rec.available_from === 'string') ? rec.available_from.trim() : '';
            if (!raw) return t('avail_unknown');
            if (/^available\s*now$/i.test(raw)) return t('avail_now');
            // ISO date (or any other non-empty value, defensively) → templated label.
            return t('avail_from_tpl').replace('{date}', raw);
        }

        // Colored status chip from `availability_status` (same convention as
        // budget_status: '✅ …' = ready/green, '⚠️ …' = later/amber). Null when empty.
        function buildAvailabilityBadge(rec) {
            const raw = (rec && typeof rec.availability_status === 'string') ? rec.availability_status.trim() : '';
            if (!raw) return null;
            const isReady = raw.indexOf('✅') !== -1;
            const badge = document.createElement('span');
            badge.style.cssText = 'font-size:11px;padding:2px 8px;border-radius:4px;font-weight:600;display:inline-block;'
                + (isReady
                    ? 'background:#ecfdf5;color:#047857;border:1px solid #a7f3d0;'
                    : 'background:#fffbeb;color:#b45309;border:1px solid #fcd34d;');
            badge.textContent = isReady ? t('avail_ready') : t('avail_later');
            return badge;
        }

        // Built entirely with DOM APIs — dynamic listing/LLM values go through
        // textContent (never innerHTML), so they cannot inject markup.
        function createPropertyCard(rec) {
            const images = Array.isArray(rec.images) ? rec.images : [];
            const hasImages = images.length > 0;
            const url = rec.url || '';
            const isFav = favorites.has(url);

            const card = el('div', 'property-card');

            // --- image container ---
            const imgc = el('div', 'property-image-container');
            if (hasImages) {
                const img = document.createElement('img');
                img.className = 'property-image';
                img.src = safeImgSrc(images[0]);
                img.alt = rec.address || '';
                img.addEventListener('error', function () { this.style.display = 'none'; });
                imgc.appendChild(img);
                const cb = el('span', 'image-count-badge');
                cb.innerHTML = getIcon('camera', 'icon-sm');
                cb.appendChild(document.createTextNode(' ' + images.length));
                imgc.appendChild(cb);
            } else {
                const ph = document.createElement('div');
                ph.style.cssText = 'display:flex;align-items:center;justify-content:center;height:100%;color:#9ca3af;flex-direction:column;gap:8px;';
                ph.innerHTML = getIcon('building');
                const noImg = document.createElement('span');
                noImg.style.fontSize = '12px';
                noImg.textContent = t('no_image');
                ph.appendChild(noImg);
                imgc.appendChild(ph);
            }
            const rankBadge = el('span', 'rank-badge');
            rankBadge.textContent = '#' + (rec.rank != null ? rec.rank : '');
            imgc.appendChild(rankBadge);
            imgc.addEventListener('click', () => openGallery(images, rec.address || ''));
            card.appendChild(imgc);

            // --- content ---
            const content = el('div', 'property-content');
            const top = document.createElement('div');

            // Area badge — which search area this listing came from (optional).
            const areaName = (typeof rec.area === 'string') ? rec.area.trim() : '';
            if (areaName) {
                const areaBadge = el('span', 'property-area-badge');
                areaBadge.innerHTML = getIcon('mapPin', 'icon-sm');   // trusted local icon
                const an = el('span', 'area-name');
                an.textContent = areaName;
                areaBadge.appendChild(an);
                top.appendChild(areaBadge);
            }

            const header = el('div', 'property-header');
            const addr = el('div', 'property-address');
            addr.textContent = rec.address || '';
            header.appendChild(addr);

            const favBtn = el('button', isFav ? 'favorite-btn active' : 'favorite-btn');
            favBtn.title = t('save_btn');
            favBtn.setAttribute('aria-label', t('save_btn'));
            favBtn.innerHTML = getIcon('heart');
            if (isFav) {
                const svg = favBtn.querySelector('svg');
                if (svg) svg.style.fill = 'currentColor';
            }
            favBtn.addEventListener('click', () => toggleFavorite(rec));
            header.appendChild(favBtn);
            top.appendChild(header);

            const details = el('div', 'property-details');
            const priceItem = el('div', 'detail-item');
            priceItem.innerHTML = getIcon('money');
            priceItem.appendChild(document.createTextNode(' ' + (rec.price || '')));
            details.appendChild(priceItem);
            const timeItem = el('div', 'detail-item');
            timeItem.innerHTML = getIcon('clock');
            timeItem.appendChild(document.createTextNode(' ' + (rec.travel_time || '')));
            details.appendChild(timeItem);
            const badge = buildBudgetBadge(rec);
            if (badge) details.appendChild(badge);
            top.appendChild(details);

            // Move-in availability — always rendered so every card states when the
            // tenancy can start (date / now / "ask the agent"), plus an optional
            // color-coded status chip. All text via textContent (XSS-safe).
            const avail = el('div', 'property-availability');
            const availText = el('span', 'avail-text');
            availText.innerHTML = getIcon('calendar', 'icon-sm');   // trusted local icon
            const availLabel = document.createElement('span');
            availLabel.textContent = availabilityText(rec);
            availText.appendChild(availLabel);
            avail.appendChild(availText);
            const availBadge = buildAvailabilityBadge(rec);
            if (availBadge) avail.appendChild(availBadge);
            top.appendChild(avail);

            const expl = el('div', 'property-explanation');
            expl.textContent = rec.explanation || '';
            top.appendChild(expl);

            // Optional full description — collapsed behind a "Details" toggle. Kept
            // separate from the short `explanation` summary above. Skipped when it is
            // empty or just a duplicate of the explanation.
            const descText = (typeof rec.description === 'string') ? rec.description.trim() : '';
            if (descText && descText !== (rec.explanation || '').trim()) {
                const toggle = el('button', 'property-details-toggle');
                toggle.type = 'button';
                const caret = el('span', 'caret');
                caret.textContent = '▾';
                const tLabel = el('span', 'toggle-label');
                tLabel.textContent = t('card_details_show');
                toggle.appendChild(tLabel);
                toggle.appendChild(caret);

                const desc = el('div', 'property-description');
                desc.textContent = descText;
                desc.style.display = 'none';

                toggle.addEventListener('click', function () {
                    const open = desc.style.display === 'none';
                    desc.style.display = open ? 'block' : 'none';
                    toggle.classList.toggle('open', open);
                    tLabel.textContent = t(open ? 'card_details_hide' : 'card_details_show');
                });

                top.appendChild(toggle);
                top.appendChild(desc);
            }
            content.appendChild(top);

            const actions = el('div', 'property-actions');
            const view = document.createElement('a');
            view.className = 'action-btn primary';
            view.textContent = t('view_deal');
            if (isSafeHref(url)) {
                view.href = url;
                view.target = '_blank';
                view.rel = 'noopener noreferrer';
            } else {
                view.href = '#';
                view.addEventListener('click', e => e.preventDefault());
            }
            actions.appendChild(view);

            const mapBtn = el('button', 'action-btn');
            mapBtn.innerHTML = getIcon('mapPin', 'icon-sm');
            mapBtn.appendChild(document.createTextNode(' ' + t('map_btn')));
            mapBtn.addEventListener('click', () => openMap(rec, mapBtn));
            actions.appendChild(mapBtn);

            const askBtn = el('button', 'action-btn');
            askBtn.innerHTML = getIcon('chat', 'icon-sm');
            askBtn.appendChild(document.createTextNode(' ' + t('ask_ai_btn')));
            askBtn.addEventListener('click', () => askAboutProperty({
                address: rec.address, price: rec.price, travel_time: rec.travel_time, url: rec.url
            }));
            actions.appendChild(askBtn);

            content.appendChild(actions);
            card.appendChild(content);
            return card;
        }

        // Ask-AI on a card focuses that card's owning pane (the pane whose search
        // produced these results). Falls back to the active/main pane.
        function askAboutProperty(property) {
            const pane = ownerPane();
            const normalized = recordViewedProperty(property);
            const key = propertyContextKey(normalized);
            // 重复点击已在栈内的房源 → 移到栈顶；否则新入栈。栈满丢最旧。
            pane.focusStack = pane.focusStack.filter(item => propertyContextKey(item) !== key);
            pane.focusStack.push(normalized);
            pane.focusStack = pane.focusStack.slice(-MAX_FOCUS_STACK);
            renderFocusIndicator(pane);

            setActivePane(pane);
            pane.inputEl.placeholder = t('placeholder_focus');
            pane.inputEl.focus();
        }

        // 单套移出聚焦栈；移除后若栈非空，指示条保留并让新栈顶获得高亮。
        function removeFocusItem(key, pane) {
            pane.focusStack = pane.focusStack.filter(item => propertyContextKey(item) !== key);
            if (!pane.focusStack.length) {
                clearPropertyFocus(pane);
            } else {
                renderFocusIndicator(pane);
            }
        }

        // 依据 pane.focusStack 重绘该 pane 的指示条：计数头部 + 每套一个 chip（末位=当前聚焦）。
        function renderFocusIndicator(pane) {
            const indicator = pane.focusIndicatorEl;
            if (!pane.focusStack.length) {
                indicator.style.display = 'none';
                indicator.innerHTML = '';
                return;
            }
            indicator.style.display = 'flex';
            indicator.innerHTML = '';

            // 头部：图标 + 计数 + 清除全部
            const head = document.createElement('div');
            head.className = 'focus-head';
            const label = document.createElement('div');
            label.className = 'focus-head-label';
            label.innerHTML = getIcon('mapPin', 'icon-sm');
            const labelText = document.createElement('span');
            labelText.textContent = pane.focusStack.length === 1
                ? t('focus_count_one')
                : t('focus_count_many').replace('{n}', pane.focusStack.length);
            label.appendChild(labelText);
            head.appendChild(label);

            const clearAll = document.createElement('button');
            clearAll.type = 'button';
            clearAll.className = 'focus-clear-all';
            clearAll.textContent = t('focus_clear_all');
            clearAll.addEventListener('click', () => clearPropertyFocus(pane));
            head.appendChild(clearAll);
            indicator.appendChild(head);

            // Chips：旧→新，末位（栈顶）标记为当前聚焦。
            const chips = document.createElement('div');
            chips.className = 'focus-chips';
            pane.focusStack.forEach((item, idx) => {
                const isCurrent = idx === pane.focusStack.length - 1;
                const chip = document.createElement('div');
                chip.className = 'focus-chip' + (isCurrent ? ' is-current' : '');
                if (isCurrent) chip.title = t('focus_current');

                const text = document.createElement('span');
                text.className = 'focus-chip-text';
                const addr = item.address || item.url || '';
                text.textContent = addr.length > 24 ? addr.substring(0, 24) + '...' : addr;
                chip.appendChild(text);

                const remove = document.createElement('button');
                remove.type = 'button';
                remove.className = 'focus-chip-remove';
                remove.title = t('focus_remove');
                remove.setAttribute('aria-label', t('focus_remove'));
                remove.innerHTML = getIcon('close', 'icon-sm');
                const itemKey = propertyContextKey(item);
                remove.addEventListener('click', () => removeFocusItem(itemKey, pane));
                chip.appendChild(remove);

                chips.appendChild(chip);
            });
            indicator.appendChild(chips);
        }

        // 清空某 pane 的整个聚焦栈（切换会话 / 分支 / 清除全部）。
        function clearPropertyFocus(pane) {
            pane.focusStack = [];
            const indicator = pane.focusIndicatorEl;
            indicator.style.display = 'none';
            indicator.innerHTML = '';
            pane.inputEl.placeholder = t('placeholder_input');
        }

        function normalizePropertyContext(property) {
            if (!property || typeof property !== 'object') return null;
            const normalized = {
                address: String(property.address || '').trim().slice(0, 500),
                price: String(property.price || '').trim().slice(0, 100),
                travel_time: String(property.travel_time || '').trim().slice(0, 100),
                url: String(property.url || '').trim().slice(0, 2000)
            };
            return normalized.address || normalized.url ? normalized : null;
        }

        function propertyContextKey(property) {
            const url = (property.url || '').toLowerCase();
            if (url) return 'url:' + url;
            return 'address:' + (property.address || '').toLowerCase();
        }

        function loadViewedProperties() {
            try {
                const stored = JSON.parse(localStorage.getItem(viewedPropertiesStorageKey()) || '[]');
                const unique = new Map();
                if (Array.isArray(stored)) {
                    stored.forEach(item => {
                        const property = normalizePropertyContext(item);
                        if (property) unique.set(propertyContextKey(property), property);
                    });
                }
                viewedProperties = Array.from(unique.values()).slice(-MAX_VIEWED_PROPERTIES);
            } catch (_) {
                viewedProperties = [];
            }
        }

        function persistViewedProperties() {
            try {
                localStorage.setItem(viewedPropertiesStorageKey(), JSON.stringify(viewedProperties));
            } catch (_) {
                // Storage can be unavailable (privacy mode / quota); the in-memory list
                // still accompanies requests for the rest of this session.
            }
        }

        function recordViewedProperty(property) {
            const normalized = normalizePropertyContext(property);
            if (!normalized) return property || {};
            const key = propertyContextKey(normalized);
            // Re-clicking a card refreshes its recency while keeping a single entry.
            viewedProperties = viewedProperties.filter(item => propertyContextKey(item) !== key);
            viewedProperties.push(normalized);
            viewedProperties = viewedProperties.slice(-MAX_VIEWED_PROPERTIES);
            persistViewedProperties();
            return normalized;
        }

        function switchView(view) {
            setActiveTab(view);
            if (view === 'favorites') loadFavorites();
            else displayResults(currentResults);
        }

        /* FAVORITES (per-user, persisted; sends full property incl geo_location)     */

        function buildFavoritePayload(rec) {
            return {
                user_id: getUserId(),
                url: rec.url || '',
                address: rec.address || '',
                price: rec.price || '',
                travel_time: rec.travel_time || '',
                explanation: rec.explanation || '',
                images: Array.isArray(rec.images) ? rec.images : [],
                geo_location: rec.geo_location || '',
                rank: rec.rank,
                budget_status: rec.budget_status || '',
                match_type: rec.match_type || '',
                available_from: rec.available_from || '',
                availability_status: rec.availability_status || ''
            };
        }

        // Normalise a stored favorite (lowercase-first, capitalized fallback) into a card rec.
        function favToRec(fav, i) {
            const tt = (fav.travel_time != null && fav.travel_time !== '')
                ? fav.travel_time
                : ((fav.travel_time_minutes != null ? fav.travel_time_minutes : 'N/A') + ' min');
            return {
                rank: fav.rank != null ? fav.rank : (i + 1),
                address: fav.address || fav.Address || '',
                price: fav.price || fav.Price || '',
                travel_time: tt,
                explanation: fav.explanation || '',
                url: fav.url || fav.URL || '',
                images: fav.images || fav.Images || [],
                geo_location: fav.geo_location || '',
                budget_status: fav.budget_status || '',
                match_type: fav.match_type || '',
                available_from: fav.available_from || '',
                availability_status: fav.availability_status || ''
            };
        }

        function favUrl(fav) { return fav.url || fav.URL || ''; }

        async function fetchFavorites() {
            try {
                const response = await apiFetch('/api/favorites', { method: 'GET' });
                if (!response.ok) {
                    favoriteItems = [];
                    favorites.clear();
                    updateFavCount();
                    return false;
                }
                const data = await response.json();
                favoriteItems = Array.isArray(data.favorites) ? data.favorites : [];
                favorites = new Set(favoriteItems.map(favUrl).filter(Boolean));
                updateFavCount();
                return true;
            } catch (error) {
                if (error && error.name === 'AbortError') return false;
                console.warn('Could not load favorites:', error);
                return false;
            }
        }

        function renderFavorites() {
            const content = document.getElementById('resultsContent');
            content.innerHTML = '';
            if (!favoriteItems.length) {
                content.appendChild(buildEmptyState('heart', t('empty_saved_title'), t('empty_saved_desc')));
                return;

            favoriteItems.map(favToRec).forEach(rec => content.appendChild(createPropertyCard(rec)));

        async function loadFavorites() {
            const content = document.getElementById('resultsContent');
            if (favoritesTabActive() && !favoriteItems.length) {
                content.innerHTML = '<div style="text-align:center;padding:60px;"><div class="spinner"></div></div>';
            }
            const ok = await fetchFavorites();

            if (!ok) {
                content.innerHTML = '';
                content.appendChild(buildEmptyState('error', t('backend_offline_title'), t('backend_offline_desc')));
                return;

            renderFavorites();

        async function toggleFavorite(rec) {
            const url = rec.url || '';
            if (!url) return;
            const isRemoving = favorites.has(url);

            try {
                if (isRemoving) {
                    const response = await apiFetch('/api/favorites/' + encodeURIComponent(url), { method: 'DELETE' });
                    if (!response.ok) { showToast(t('error_favorite'), 'error'); return; }
                    favorites.delete(url);
                    favoriteItems = favoriteItems.filter(f => favUrl(f) !== url);
                } else {
                    const payload = buildFavoritePayload(rec);
                    const response = await apiFetch('/api/favorites', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (!response.ok) { showToast(t('error_favorite'), 'error'); return; }
                    favorites.add(url);
                    if (!favoriteItems.some(f => favUrl(f) === url)) favoriteItems.push(payload);
                }

                updateFavCount();
                if (favoritesTabActive()) renderFavorites();
                else displayResults(currentResults);
            } catch (error) {
                if (error && error.name === 'AbortError') return;
                console.error('Favorite error:', error);
                showToast(t('error_connection'), 'error');
            }
        }

        /* -------------------------------------------------------------------------- */
        /* CONVERSATIONS                                                              */
        /* -------------------------------------------------------------------------- */
        function formatRelativeTime(iso) {
            if (!iso) return '';
            const d = new Date(iso);
            if (isNaN(d.getTime())) return '';
            const diff = (Date.now() - d.getTime()) / 1000;
            if (diff < 60) return t('time_now');
            if (diff < 3600) return Math.floor(diff / 60) + t('time_min');
            if (diff < 86400) return Math.floor(diff / 3600) + t('time_hour');
            if (diff < 604800) return Math.floor(diff / 86400) + t('time_day');
            return d.toLocaleDateString();
        }

        // Tooltip text for a forked conversation's branch glyph. Resolves the parent
        // title from the loaded list; falls back to a short id, then a generic label.
        function branchedFromLabel(conv) {
            const parent = conversations.find(c => c.id === conv.parent_conversation_id);
            let name;
            if (parent && parent.title) name = parent.title;
            else if (conv.parent_conversation_id) name = String(conv.parent_conversation_id).slice(0, 8);
            else name = t('branch_fallback_title');
            return t('branched_from_tpl').replace('{title}', name);
        }

        // --- Branch-stacking: group by root, collapsible, drag/compare aware ---
        const LS_COLLAPSED_GROUPS = 'ukra_collapsed_groups';
        function getCollapsedGroups() {
            try { return new Set(JSON.parse(localStorage.getItem(LS_COLLAPSED_GROUPS) || '[]')); }
            catch (_) { return new Set(); }
        }
        function setGroupCollapsed(rootId, collapsed) {
            const s = getCollapsedGroups();
            if (collapsed) s.add(rootId); else s.delete(rootId);
            localStorage.setItem(LS_COLLAPSED_GROUPS, JSON.stringify(Array.from(s)));
        }
        function tsOf(iso) { const d = new Date(iso); return isNaN(d.getTime()) ? 0 : d.getTime(); }

        // Group conversations by root_conversation_id. Groups are ordered by their most
        // recent updated_at (DESC, preserving the existing sort feel); branches inside a
        // group are ordered by created_at ASC (the original continuation first).
        function buildConversationGroups() {
            const byId = {};
            conversations.forEach(c => { byId[c.id] = c; });
            const rootOf = c => c.root_conversation_id || c.id;
            const buckets = {};
            conversations.forEach(c => {
                const rid = rootOf(c);
                (buckets[rid] || (buckets[rid] = [])).push(c);
            });
            const groups = Object.keys(buckets).map(rid => {
                const items = buckets[rid];
                let root = byId[rid] || null;
                let children = items.filter(c => c.id !== rid);
                if (!root) {
                    // Root itself isn't in the list (e.g. deleted) — promote the earliest item.
                    const sorted = items.slice().sort((a, b) => tsOf(a.created_at) - tsOf(b.created_at));
                    root = sorted[0];
                    children = items.filter(c => c !== root);
                }
                children.sort((a, b) => tsOf(a.created_at) - tsOf(b.created_at));
                const latest = Math.max.apply(null, items.map(c => tsOf(c.updated_at) || tsOf(c.created_at)));
                return { rootId: rid, root: root, children: children, latest: latest };
            });
            groups.sort((a, b) => b.latest - a.latest);
            return groups;
        }

        function buildConvItem(conv, isBranch) {
            const openPane = paneForConversation(conv.id);
            const item = el('div', 'conv-item'
                + (openPane ? ' active open-in-pane' : '')
                + (isBranch ? ' is-branch' : ''));
            item.dataset.convId = conv.id;
            item.setAttribute('draggable', 'true');
            item.addEventListener('dragstart', e => onConvDragStart(e, conv, item));
            item.addEventListener('dragend', () => onConvDragEnd(item));

            const main = el('button', 'conv-item-main');
            const titleRow = el('div', 'conv-title-row');
            if (conv.parent_conversation_id) {
                const glyph = el('span', 'conv-branch-glyph');
                glyph.innerHTML = getIcon('branch', 'icon-sm');
                glyph.title = branchedFromLabel(conv);
                titleRow.appendChild(glyph);
            }
            const title = el('span', 'conv-title');
            title.textContent = conv.title || t('untitled_chat');
            titleRow.appendChild(title);
            const meta = el('span', 'conv-meta');
            meta.textContent = formatRelativeTime(conv.updated_at);
            main.appendChild(titleRow);
            main.appendChild(meta);
            main.addEventListener('click', () => switchConversation(mainPane, conv.id));
            item.appendChild(main);

            const actionsWrap = el('div', 'conv-item-actions');
            const compareBtn = el('button', 'conv-icon-btn');
            compareBtn.title = t('compare_action');
            compareBtn.setAttribute('aria-label', t('compare_action'));
            compareBtn.innerHTML = getIcon('compare', 'icon-sm');
            compareBtn.addEventListener('click', e => { e.stopPropagation(); requestCompare(conv.id); });
            const branchBtn = el('button', 'conv-icon-btn');
            branchBtn.title = t('branch_action');
            branchBtn.setAttribute('aria-label', t('branch_action'));
            branchBtn.innerHTML = getIcon('branch', 'icon-sm');
            branchBtn.addEventListener('click', e => { e.stopPropagation(); forkConversation(conv.id, null, branchBtn, mainPane); });
            const renameBtn = el('button', 'conv-icon-btn');
            renameBtn.title = t('rename');
            renameBtn.setAttribute('aria-label', t('rename'));
            renameBtn.innerHTML = getIcon('edit', 'icon-sm');
            renameBtn.addEventListener('click', e => { e.stopPropagation(); promptRenameConversation(conv); });
            const delBtn = el('button', 'conv-icon-btn');
            delBtn.title = t('delete');
            delBtn.setAttribute('aria-label', t('delete'));
            delBtn.innerHTML = getIcon('trash', 'icon-sm');
            delBtn.addEventListener('click', e => { e.stopPropagation(); promptDeleteConversation(conv); });
            actionsWrap.appendChild(compareBtn);
            actionsWrap.appendChild(branchBtn);
            actionsWrap.appendChild(renameBtn);
            actionsWrap.appendChild(delBtn);
            item.appendChild(actionsWrap);
            return item;
        }

        function renderConversationList() {
            const list = document.getElementById('convList');
            list.innerHTML = '';
            if (!conversations.length) {
                const empty = el('div', 'conv-empty');
                empty.textContent = t('no_conversations');
                list.appendChild(empty);
                return;
            }
            const collapsed = getCollapsedGroups();
            buildConversationGroups().forEach(group => {
                const groupEl = el('div', 'conv-group');
                const rootRow = el('div', 'conv-root-row');
                const hasChildren = group.children.length > 0;
                const isCollapsed = collapsed.has(group.rootId);
                if (hasChildren) {
                    const caret = el('button', 'conv-collapse-btn' + (isCollapsed ? ' collapsed' : ''));
                    caret.type = 'button';
                    caret.title = isCollapsed ? t('expand_branches') : t('collapse_branches');
                    caret.setAttribute('aria-label', caret.title);
                    caret.innerHTML = getIcon('chevronRight', 'icon-sm');
                    caret.addEventListener('click', e => {
                        e.stopPropagation();
                        setGroupCollapsed(group.rootId, !collapsed.has(group.rootId));
                        renderConversationList();
                    });
                    rootRow.appendChild(caret);
                } else {
                    rootRow.appendChild(el('div', 'conv-collapse-spacer'));
                }
                rootRow.appendChild(buildConvItem(group.root, false));
                groupEl.appendChild(rootRow);

                if (hasChildren) {
                    const kids = el('div', 'conv-branch-children' + (isCollapsed ? ' collapsed' : ''));
                    group.children.forEach(child => kids.appendChild(buildConvItem(child, true)));
                    groupEl.appendChild(kids);
                }
                list.appendChild(groupEl);
            });
        }

        async function loadConversations(silent) {

                if (!response.ok) {
                    if (!silent) showToast(t('error_load_conversations'), 'error');
                    return;
                }
                const data = await response.json();
                conversations = Array.isArray(data.conversations) ? data.conversations : [];
                renderConversationList();
