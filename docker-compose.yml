# Full-stack deployment for the UK-rent agent.
#
#   app     :5001  ── the agent web app (uvicorn/ASGI)
#   searxng :8080  ── private metasearch backend for the web_search tool
#   valkey         ── cache / rate-limit store for SearXNG (internal only)
#
# The app reaches SearXNG over the compose network at http://searxng:8080
# (SEARXNG_URL), so the web_search tool works without anything on the host.
#
#   docker compose up -d --build      # build + start everything
#   open http://localhost:5001        # the agent UI
#
# Secrets and pre-built data come from the host via bind mounts (see `app`),
# so nothing sensitive is baked into the image.

services:
  valkey:
    image: valkey/valkey:8-alpine
    container_name: uk-rent-valkey
    command: valkey-server --save 30 1 --loglevel warning
    restart: unless-stopped
    networks: [rentnet]
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  searxng:
    image: searxng/searxng:latest
    container_name: uk-rent-searxng
    restart: unless-stopped
    depends_on:
      valkey:
        condition: service_started
    networks: [rentnet]
    ports:
      # Published to the host too, so a host-run copy of the app (or curl) can
      # also hit the JSON API at http://localhost:8080.
      - "8080:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      # Public URL SearXNG advertises for itself.
      SEARXNG_BASE_URL: "http://localhost:8080/"
      # Overrides server.secret_key in settings.yml. Never hardcode this: Compose
      # reads it from the root-level .env (its default env file) or the shell
      # environment at `docker compose` time. `:?` makes the stack refuse to start
      # if it is unset, so an empty/placeholder secret can never ship silently.
      # Generate one with:  openssl rand -hex 32   (see .env.example)
      SEARXNG_SECRET: "${SEARXNG_SECRET:?SEARXNG_SECRET must be set in .env (openssl rand -hex 32)}"
    healthcheck:
      # Verifies the instance is up AND that the JSON API (the whole point) is
      # actually enabled — a default install would 403 here.
      test:
        - "CMD-SHELL"
        - "wget -q -O /dev/null 'http://localhost:8080/search?q=ping&format=json' || exit 1"
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: uk-rent-agent:latest
    container_name: uk-rent-app
    restart: unless-stopped
    # Trust the X-Forwarded-* headers set by the nginx reverse proxy so the app
    # sees the real client IP and https scheme (needed for Secure session cookies).
    # forwarded-allow-ips=* is safe because the port is bound to 127.0.0.1 (see
    # the ports: mapping) — only nginx on this host can reach the app.
    command:
      - python
      - -m
      - uvicorn
      - uk_rent_agent.web.asgi:create_asgi_app
      - --factory
      - --host
      - "0.0.0.0"
      - --port
      - "5001"
      - --proxy-headers
      - --forwarded-allow-ips
      - "*"
    depends_on:
      searxng:
        condition: service_healthy
      valkey:
        condition: service_started
    networks: [rentnet]
    ports:
      # Bound to loopback only: reachable via the nginx reverse proxy on this
      # host, NOT exposed on the public IP. (Was "5001:5001".)
      - "127.0.0.1:5001:5001"
    # Brings in LLM keys, FLASK_SECRET_KEY, PROPERTY_SOURCE, etc.
    env_file:
      - ./app/.env
    environment:
      # Point the web_search tool at the SearXNG service on the compose network.
      SEARXNG_URL: "http://searxng:8080"
      PYTHONUNBUFFERED: "1"
      # This deployment is a demo: guests can use the app without registering.
      # Their server-issued session cookie remains the identity boundary.
      REQUIRE_AUTH: "false"
      SESSION_COOKIE_SECURE: "true"
      ALLOW_LEGACY_CLIENT_USER_ID: "false"
      MAX_REQUEST_BYTES: "262144"
      # --- Canary pins (legacy pool) ------------------------------------------
      # These only make the current effective defaults EXPLICIT + turn on
      # per-turn telemetry; they change no behaviour. They take effect the next
      # time this container is RECREATED — ops keeps the running legacy
      # container as-is; recreate it on a telemetry-capable image before
      # advancing past the `internal` stage (see docs/canary_runbook.md).
      AGENT_ARCH: "legacy"
      CHECKPOINT_DB_PATH: "/app/.runtime/checkpoints.sqlite3"
      # Conversation store is SHARED between pools (same file as app-fc): the
      # sticky per-conversation arch assignment and the user-visible message
      # transcript live here, so on rollback legacy can rebuild any fc
      # conversation from the shared history. Checkpoints, by contrast, are
      # SEPARATE per arch (see CHECKPOINT_DB_PATH above / app-fc below): legacy
      # must NEVER read fc's LangGraph checkpoints — that state is treated as
      # untrusted/abandoned after rollback.
      CONVERSATION_DB_PATH: "/app/.runtime/conversations.sqlite3"
      CANARY_LOG_PATH: "/app/.runtime/logs/canary-legacy.jsonl"
    volumes:
      # Secrets (also read directly by config.from_env via load_dotenv).
      - ./app/.env:/app/app/.env:ro
      # Pre-built + writable RAG indexes and runtime state, shared with the host.
      - ./chroma_db:/app/chroma_db
      - ./chroma_db_area:/app/chroma_db_area
      - ./app/chroma_db_agent_memory:/app/app/chroma_db_agent_memory
      - ./app/data:/app/app/data
      - ./.runtime:/app/.runtime
      # Embedding-model cache so it is downloaded only once.
      - hf_cache:/opt/hf-cache
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5001/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

  # --- Canary fc pool (internal stage) --------------------------------------
  # The second pool that runs the candidate `fc_loop` arch alongside legacy.
  # It is gated behind the "canary" profile, so the plain
  #   docker compose up -d
  # brings up ONLY the legacy stack (app/searxng/valkey) — unchanged. The fc
  # pool starts explicitly with:
  #   docker compose --profile canary up -d app-fc
  #
  # IMMUTABILITY: no `build:` here on purpose. The fc pool runs a fixed,
  # pre-built image referenced by its immutable tag, so the working tree can
  # never silently become what canary traffic executes. Build the tag out of
  # band (git worktree/archive at the candidate sha) and set FC_CANARY_IMAGE +
  # FC_CANARY_SHA in the compose .env — see docs/canary_runbook.md "Image build".
  app-fc:
    profiles: ["canary"]
    image: "${FC_CANARY_IMAGE:?FC_CANARY_IMAGE must be set to the immutable canary image, e.g. uk-rent-agent:canary-fc-loop-<sha>}"
    container_name: uk-rent-app-fc
    restart: unless-stopped
    # Identical entrypoint to `app`: same uvicorn factory, same proxy-header
    # handling. Only the arch/strict flags and DB/telemetry paths differ (below).
    command:
      - python
      - -m
      - uvicorn
      - uk_rent_agent.web.asgi:create_asgi_app
      - --factory
      - --host
      - "0.0.0.0"
      - --port
      - "5001"
      - --proxy-headers
      - --forwarded-allow-ips
      - "*"
    depends_on:
      searxng:
        condition: service_healthy
      valkey:
        condition: service_started
    networks: [rentnet]
    ports:
      # Loopback only, and deliberately NOT wired into the host nginx: during
      # the `internal` stage the fc pool takes internal-only traffic (curl /
      # manual smoke) on :5002. Public canary weighting comes later, upstream.
      - "127.0.0.1:5002:5001"
    # Same secrets/keys as legacy.
    env_file:
      - ./app/.env
    environment:
      # Everything the legacy `app` service sets...
      SEARXNG_URL: "http://searxng:8080"
      PYTHONUNBUFFERED: "1"
      REQUIRE_AUTH: "false"
      SESSION_COOKIE_SECURE: "true"
      ALLOW_LEGACY_CLIENT_USER_ID: "false"
      MAX_REQUEST_BYTES: "262144"
      # ...plus the canary knobs that make this the fc pool:
      AGENT_ARCH: "fc_loop"
      # Strict function-calling (1 = strict FC) for the fc_loop harness.
      DEEPSEEK_STRICT: "1"
      # Pinned candidate sha — surfaced in X-Agent-Version and per-turn telemetry.
      APP_CANDIDATE_SHA: "${FC_CANARY_SHA:?FC_CANARY_SHA must be set to the candidate commit sha}"
      # SEPARATE checkpoint DB: fc's LangGraph checkpoints live in their own
      # file so legacy never reads them (and vice-versa). This is the state
      # isolation boundary between the two arches.
      CHECKPOINT_DB_PATH: "/app/.runtime/checkpoints_fc.sqlite3"
      # SHARED conversation store: same file as legacy `app`. Sticky arch
      # assignment + the user-visible transcript live here so either pool can
      # rebuild a conversation from shared history (critical for rollback).
      CONVERSATION_DB_PATH: "/app/.runtime/conversations.sqlite3"
      # Per-turn canary telemetry sink (event canary.turn), one bare-JSON line
      # per turn; consumed by scripts/canary_report.py --input .runtime/logs/.
      CANARY_LOG_PATH: "/app/.runtime/logs/canary-fc_loop.jsonl"
    volumes:
      # Same bind mounts as `app` — crucially the SHARED ./.runtime, which holds
      # the shared conversation store, both (separate) checkpoint DBs, and the
      # host-visible telemetry logs under ./.runtime/logs/.
      - ./app/.env:/app/app/.env:ro
      - ./chroma_db:/app/chroma_db
      - ./chroma_db_area:/app/chroma_db_area
      - ./app/chroma_db_agent_memory:/app/app/chroma_db_agent_memory
      - ./app/data:/app/app/data
      - ./.runtime:/app/.runtime
      - hf_cache:/opt/hf-cache
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5001/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

networks:
  rentnet:
    driver: bridge

volumes:
  valkey_data:
  hf_cache:
