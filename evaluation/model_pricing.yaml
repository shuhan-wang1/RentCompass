# RentCompass — model pricing config (standalone; NOT hardcoded in business logic).
#
# Prices are USD per 1,000,000 tokens. `null` means "price not confirmed" — in
# that case evaluation/metrics/pricing.py returns cost=None and only the token
# counts should be trusted.
#
# IMPORTANT: prices move. Re-confirm against `price_source` before quoting spend.
price_source: "https://api-docs.deepseek.com/quick_start/pricing (official DeepSeek API pricing page)"
price_as_of: "2026-07-19"

# Notes on the DeepSeek entries below:
#   * Confirmed 2026-07-19 from the official pricing page. `deepseek-v4-flash` is the
#     live hot-path model; `deepseek-v4-pro` is the stronger model (ModelRouter
#     purpose="pro"). The legacy aliases `deepseek-chat` / `deepseek-reasoner` are the
#     non-thinking / thinking modes of `deepseek-v4-flash` and share its rates; per the
#     docs they "will be deprecated on 2026/07/24 15:59 UTC" — kept here so historical
#     event logs still price, but re-verify / remove after that date.
#   * `cached_input` = DeepSeek "cache hit" input price (prompt_cache_hit_tokens).
#     `input` = "cache miss" input price (prompt_cache_miss_tokens).
currency: USD
per_tokens: 1000000

models:
  # Live hot-path model (native FC loop). Confirmed 2026-07-19 from price_source.
  deepseek-v4-flash:
    input: 0.14          # cache miss, per 1M input tokens
    cached_input: 0.0028 # cache hit, per 1M input tokens
    output: 0.28         # per 1M output tokens
  # Stronger model, ModelRouter purpose="pro". Confirmed 2026-07-19 from price_source.
  deepseek-v4-pro:
    input: 0.435          # cache miss, per 1M input tokens
    cached_input: 0.003625 # cache hit, per 1M input tokens
    output: 0.87          # per 1M output tokens
  # Deprecated aliases (share deepseek-v4-flash rates); removed after 2026/07/24.
  deepseek-chat:
    input: 0.14          # cache miss, per 1M input tokens
    cached_input: 0.0028 # cache hit, per 1M input tokens
    output: 0.28         # per 1M output tokens
  deepseek-reasoner:
    input: 0.14
    cached_input: 0.0028
    output: 0.28
