<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alex - Intelligent Property Search</title>
    <!-- 引入专业英文字体 Plus Jakarta Sans 和中文字体备选 -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* --- 企业级配色系统 (保持原有红色主调，但优化了中性色) --- */
            --primary-color: #dc2626;
            --primary-hover: #b91c1c;
            --primary-active: #991b1b;
            --primary-light: #fef2f2;
            --primary-fade: rgba(220, 38, 38, 0.06);

            /* 中性色 - Cool Grays for Professional Look */
            --text-main: #1f2937;      /* 更深的灰，比纯黑柔和 */
            --text-secondary: #6b7280; /* 次级文本 */
            --text-tertiary: #9ca3af;  /* 占位符或禁用态 */

            --bg-body: #f3f4f6;        /* 浅灰背景 */
            --bg-surface: #ffffff;     /* 纯白卡片背景 */
            --bg-hover: #f9fafb;       /* 悬停背景 */

            --border-light: #f3f4f6;
            --border-medium: #e5e7eb;
            --border-dark: #d1d5db;

            /* --- 阴影系统 (更弥散、高端) --- */
            --shadow-xs: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-sm: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --shadow-focus: 0 0 0 3px var(--primary-fade);

            /* --- 倒角 (稍微减小，更商务) --- */
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-full: 9999px;

            /* --- 动画 --- */
            --transition-base: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            /* FIX: 优化了字体栈顺序。
               将 "Apple Color Emoji", "Segoe UI Emoji" 等表情符号字体放在中文字体之前。
               这样浏览器遇到 Emoji 字符时，会优先使用系统的彩色 Emoji 字体，而不是中文字体里的黑白字符。
            */
            font-family: 'Plus Jakarta Sans', 'Apple Color Emoji', 'Segoe UI Emoji', 'Segoe UI Symbol', 'Noto Color Emoji', -apple-system, "PingFang SC", "Microsoft YaHei", BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            font-size: 14px; /* 基础字号微调 */
            line-height: 1.5;
        }

        /* --- ICON SVG STYLES --- */
        .icon {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
            display: inline-block;
            flex-shrink: 0;
        }
        .icon-sm { width: 14px; height: 14px; }
        .icon-lg { width: 24px; height: 24px; }

        /* --- 顶部导航 (Navbar) --- */
        .navbar {
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border-medium);
            padding: 0 24px;
            height: 60px; /* 稍微压低高度 */
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            z-index: 50;
        }

        .brand {
            font-size: 1.125rem;
            font-weight: 700;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .brand-logo-bg {
            width: 32px;
            height: 32px;
            background: var(--primary-light);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-color);
        }

        .lang-switch {
            display: flex;
            background: var(--bg-body);
            padding: 3px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-medium);
        }

        .lang-btn {
            padding: 4px 10px;
            font-size: 12px;
            font-weight: 600;
            border-radius: var(--radius-sm);
            border: none;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition-base);
        }

        .lang-btn.active {
            background: var(--bg-surface);
            color: var(--text-main);
            box-shadow: var(--shadow-xs);
        }

        /* --- 主布局 (Layout) --- */
        .main-container {
            display: flex;
            flex: 1;
            height: calc(100vh - 60px);
            max-width: 1920px;
            margin: 0 auto;
            width: 100%;
            background: var(--border-medium); /* 分隔线 */
            gap: 1px;
        }

        /* --- 左侧聊天面板 (Chat Panel) --- */
        .chat-panel {
            flex: 0 0 400px;
            background: var(--bg-surface);
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
            z-index: 10;
            min-width: 0;
        }

        .chat-header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-medium);
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(8px);
        }

        .chat-header h1 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-main);
            display: flex; align-items: center; gap: 8px;
            margin-bottom: 2px;
        }
        .chat-header p { font-size: 0.8rem; color: var(--text-secondary); }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            background: #ffffff;
            scroll-behavior: smooth;
        }

        /* 消息气泡 - 专业化 */
        .message {
            max-width: 100%;
            animation: fadeIn 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .message.user { align-items: flex-end; }
        .message.alex { align-items: flex-start; }

        .message .sender {
            font-size: 11px;
            color: var(--text-tertiary);
            margin-bottom: 6px;
            margin-left: 2px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex; align-items: center; gap: 4px;
        }

        .message .bubble {
            max-width: 90%;
            padding: 12px 16px;
            border-radius: var(--radius-lg);
            font-size: 0.925rem;
            line-height: 1.6;
            position: relative;
            box-shadow: var(--shadow-sm);
            word-wrap: break-word;
        }

        /* Alex's Bubble (Light Gray) */
        .message.alex .bubble {
            background: var(--bg-body);
            color: var(--text-main);
            border-top-left-radius: 2px;
        }

        /* User's Bubble (Primary Red) */
        .message.user .bubble {
            background: var(--primary-color);
            color: white;
            border-top-right-radius: 2px;
            white-space: pre-wrap;
        }

        /* Markdown Styles within Bubbles */
        .message.alex .bubble h2,
        .message.alex .bubble h3,
        .message.alex .bubble h4 {
            margin: 10px 0 6px 0;
            font-weight: 600;
            line-height: 1.3;
            color: #111;
        }
        .message.alex .bubble ul,
        .message.alex .bubble ol { margin: 6px 0; padding-left: 20px; }
        .message.alex .bubble li { margin-bottom: 4px; }
        .message.alex .bubble p { margin-bottom: 8px; }
        .message.alex .bubble p:last-child { margin-bottom: 0; }
        .message.alex .bubble strong { color: #000; font-weight: 600; }
        .message.alex .bubble a { color: var(--primary-color); text-decoration: none; border-bottom: 1px solid transparent; }
        .message.alex .bubble a:hover { border-bottom-color: var(--primary-color); }

        /* Per-message fork ("Branch from here") — revealed on hover, mirrors conv actions */
        .message-actions { margin-top: 4px; margin-left: 2px; opacity: 0; transition: var(--transition-base); }
        .message.alex:hover .message-actions { opacity: 1; }
        .msg-branch-btn {
            display: inline-flex; align-items: center; gap: 5px; padding: 3px 8px;
            background: transparent; border: 1px solid var(--border-medium); border-radius: var(--radius-sm);
            color: var(--text-tertiary); cursor: pointer; font-family: inherit; font-size: 11px;
            transition: var(--transition-base);
        }
        .msg-branch-btn:hover { border-color: var(--primary-color); color: var(--primary-color); background: var(--primary-light); }
        .msg-branch-btn:disabled { opacity: 0.5; cursor: default; }
        .msg-branch-btn .icon { width: 13px; height: 13px; }

        /* 表格样式 */
        .message.alex .bubble table {
            width: 100%;
            border-collapse: collapse;
            margin: 12px 0;
            font-size: 0.9rem;
        }
        .message.alex .bubble table thead {
            background: #f3f4f6;
        }
        .message.alex .bubble table th {
            padding: 10px;
            text-align: left;
            font-weight: 600;
            border: 1px solid #e5e7eb;
            background: #f3f4f6;
        }
        .message.alex .bubble table td {
            padding: 10px;
            border: 1px solid #ddd;
        }
        .message.alex .bubble table tbody tr:nth-child(odd) {
            background: #fafbfc;
        }
        .message.alex .bubble table tbody tr:nth-child(even) {
            background: #ffffff;
        }

        /* --- 输入区域 (Input Area) --- */
        .chat-input-area {
            padding: 16px 24px 24px 24px;
            background: white;
            border-top: 1px solid var(--border-medium);
        }

        .quick-actions {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            overflow-x: auto;
            padding-bottom: 4px;
            scrollbar-width: none;
        }
        .quick-actions::-webkit-scrollbar { display: none; }

        .quick-action {
            padding: 6px 12px;
            background: white;
            border: 1px solid var(--border-medium);
            border-radius: var(--radius-full);
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            white-space: nowrap;
            transition: var(--transition-base);
            display: flex; align-items: center; gap: 6px;
        }
        .quick-action:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
            background: var(--primary-light);
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            align-items: flex-end;
            background: var(--bg-body);
            border: 1px solid transparent;
            border-radius: var(--radius-lg);
            padding: 8px 12px;
            transition: var(--transition-base);
        }

        .input-wrapper:focus-within {
            background: white;
            border-color: var(--primary-color);
            box-shadow: var(--shadow-focus);
        }

        .chat-textarea {
            flex: 1;
            padding: 8px 4px;
            border: none;
            background: transparent;
            font-size: 0.925rem;
            color: var(--text-main);
            outline: none;
            font-family: inherit;
            resize: none;
            max-height: 120px;
            overflow-y: auto;
            line-height: 1.5;
            min-height: 24px;
        }
        .chat-textarea::placeholder { color: var(--text-tertiary); }

        .send-btn {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-md);
            background: var(--primary-color);
            color: white;
            border: none;
            cursor: pointer;
            transition: var(--transition-base);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            margin-bottom: 2px;
        }
        .send-btn:hover { background: var(--primary-hover); }
        .send-btn:disabled { background: var(--text-tertiary); cursor: not-allowed; }
        /* Cancel / stop state while a request is in flight */
        .send-btn.is-stop { background: var(--text-main); }
        .send-btn.is-stop:hover { background: #000; }

        /* --- 焦点指示器 (Context Focus) — 聚焦栈：可同时关注多套房源 --- */
        .property-focus-indicator {
            display: none; /* JS 控制 (flex column) */
            flex-direction: column;
            gap: 8px;
            padding: 10px 16px;
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            margin: 0 24px 12px 24px;
            border-radius: var(--radius-md);
            color: #1e40af;
            font-size: 13px;
            animation: slideIn 0.2s ease;
        }
        /* 头部：计数标签 + 清除全部 */
        .property-focus-indicator .focus-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }
        .property-focus-indicator .focus-head-label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
        }
        .property-focus-indicator .focus-clear-all {
            background: none;
            border: none;
            cursor: pointer;
            color: #1e40af;
            font-size: 12px;
            padding: 2px 4px;
            border-radius: var(--radius-sm);
            text-decoration: underline;
        }
        .property-focus-indicator .focus-clear-all:hover { color: #1e3a8a; }
        /* 每套房源一个 chip；末位（栈顶）= 当前聚焦，视觉加强 */
        .property-focus-indicator .focus-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .property-focus-indicator .focus-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 8px;
            background: #ffffff;
            border: 1px solid #bfdbfe;
            border-radius: var(--radius-full);
            color: #1e40af;
            font-size: 12px;
            max-width: 100%;
        }
        .property-focus-indicator .focus-chip.is-current {
            border-color: #2563eb;
            background: #dbeafe;
            font-weight: 700;
            box-shadow: 0 0 0 1px #2563eb;
        }
        .property-focus-indicator .focus-chip-text {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .property-focus-indicator .focus-chip-remove {
            background: none;
            border: none;
            cursor: pointer;
            color: currentColor;
            display: inline-flex;
            padding: 0;
        }
        .property-focus-indicator .focus-chip-remove:hover { color: var(--primary-color); }
        @keyframes slideIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

        /* ============================================================= */
        /* CHAT PANES (single + split-screen compare)                    */
        /* ============================================================= */
        /* The wrap holds one pane (single mode) or two panes (split).   */
        .chat-panes-wrap {
            flex: 0 0 400px;
            display: flex;
            min-width: 0;
            position: relative;      /* anchors the drag drop-overlay */
            background: var(--border-medium);
            gap: 1px;                /* 1px reveals the wrap bg as a divider between panes */
        }
        /* Pane fills the wrap; overrides .chat-panel's fixed basis so two panes split 50/50. */
        .chat-pane { flex: 1 1 0; min-width: 0; }
        /* Split mode: the wrap grows to share the middle; results panel gives up room. */
        .main-container.split-active .chat-panes-wrap { flex: 1 1 auto; }
        .main-container.split-active .results-panel { flex: 0 0 360px; }
        /* Subtle active-pane accent (only meaningful when two panes are visible). */
        .main-container.split-active .chat-pane.is-active-pane { box-shadow: inset 3px 0 0 var(--primary-fade); }

        /* Secondary pane top bar: conversation title + close */
        .pane-topbar {
            display: flex; align-items: center; justify-content: space-between; gap: 8px;
            padding: 0 12px 0 16px; height: 60px; flex-shrink: 0;
            border-bottom: 1px solid var(--border-medium);
            background: rgba(255,255,255,0.95);
        }
        .pane-topbar-title {
            font-size: 0.9rem; font-weight: 600; color: var(--text-main);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0;
        }
        .pane-topbar-close {
            width: 30px; height: 30px; flex-shrink: 0; border: none; background: transparent;
            border-radius: var(--radius-sm); color: var(--text-tertiary); cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: var(--transition-base);
        }
        .pane-topbar-close:hover { background: var(--bg-hover); color: var(--primary-color); }

        /* Drag drop-overlay: shown while a sidebar conversation is being dragged. */
        .drop-overlay {
            position: absolute; inset: 0; z-index: 40; display: flex; pointer-events: none;
        }
        .drop-overlay.active { pointer-events: auto; }
        .drop-half {
            flex: 1 1 0; display: flex; align-items: center; justify-content: center;
            margin: 12px; border: 2px dashed var(--border-dark); border-radius: var(--radius-lg);
            background: rgba(220, 38, 38, 0.04); color: var(--text-secondary);
            font-size: 13px; font-weight: 600; text-align: center; padding: 12px;
            transition: var(--transition-base);
        }
        .drop-half.drag-over {
            border-color: var(--primary-color); background: var(--primary-light); color: var(--primary-color);
        }

        /* --- Feature 1: editable user messages --- */
        .user-msg-actions { margin-top: 4px; margin-right: 2px; opacity: 0; transition: var(--transition-base); }
        .message.user:hover .user-msg-actions { opacity: 1; }
        .msg-edit-btn {
            display: inline-flex; align-items: center; gap: 5px; padding: 3px 8px;
            background: transparent; border: 1px solid var(--border-medium); border-radius: var(--radius-sm);
            color: var(--text-tertiary); cursor: pointer; font-family: inherit; font-size: 11px;
            transition: var(--transition-base);
        }
        .msg-edit-btn:hover { border-color: var(--primary-color); color: var(--primary-color); background: var(--primary-light); }
        .msg-edit-btn:disabled { opacity: 0.4; cursor: default; }
        .msg-edit-btn .icon { width: 13px; height: 13px; }

        .msg-edit-box { display: flex; flex-direction: column; gap: 8px; width: 100%; max-width: 90%; }
        .msg-edit-textarea {
            width: 100%; min-width: 260px; min-height: 60px; resize: vertical;
            padding: 10px 12px; border: 1px solid var(--primary-color); border-radius: var(--radius-md);
            font-family: inherit; font-size: 0.925rem; line-height: 1.5; color: var(--text-main);
            background: white; outline: none; box-shadow: var(--shadow-focus);
        }
        .msg-edit-row { display: flex; align-items: center; gap: 8px; justify-content: flex-end; }
        .msg-edit-hint { flex: 1; font-size: 11px; color: var(--text-tertiary); }
        .msg-edit-action {
            padding: 5px 12px; border-radius: var(--radius-sm); font-size: 12px; font-weight: 600;
            font-family: inherit; cursor: pointer; transition: var(--transition-base); border: 1px solid var(--border-medium);
            background: white; color: var(--text-secondary);
        }
        .msg-edit-action.primary { background: var(--primary-color); border-color: var(--primary-color); color: white; }
        .msg-edit-action.primary:hover { background: var(--primary-hover); }
        .msg-edit-action:not(.primary):hover { border-color: var(--border-dark); color: var(--text-main); }

        /* --- Feature 1: version switcher (‹ k/n ›) under a user bubble --- */
        .version-switcher {
            display: inline-flex; align-items: center; gap: 4px; margin-top: 4px; margin-right: 2px;
            font-size: 11px; color: var(--text-tertiary); user-select: none;
        }
        .version-switcher button {
            width: 18px; height: 18px; padding: 0; border: none; background: transparent;
            color: var(--text-tertiary); cursor: pointer; display: inline-flex; align-items: center; justify-content: center;
            border-radius: var(--radius-sm); transition: var(--transition-base);
        }
        .version-switcher button:hover:not(:disabled) { color: var(--primary-color); background: var(--primary-light); }
        .version-switcher button:disabled { opacity: 0.3; cursor: default; }
        .version-switcher .icon { width: 13px; height: 13px; }
        .version-switcher-count { min-width: 26px; text-align: center; font-variant-numeric: tabular-nums; }

        /* --- Feature 1: sidebar branch stacking --- */
        .conv-group { display: flex; flex-direction: column; gap: 2px; }
        .conv-root-row { display: flex; align-items: stretch; }
        .conv-collapse-btn {
            width: 20px; flex-shrink: 0; border: none; background: transparent; cursor: pointer;
            color: var(--text-tertiary); display: flex; align-items: center; justify-content: center;
            border-radius: var(--radius-sm); transition: var(--transition-base);
        }
        .conv-collapse-btn:hover { color: var(--primary-color); }
        .conv-collapse-btn .icon { width: 13px; height: 13px; transition: transform 0.2s ease; }
        .conv-collapse-btn.collapsed .icon { transform: rotate(-90deg); }
        .conv-collapse-spacer { width: 20px; flex-shrink: 0; }
        .conv-branch-children { display: flex; flex-direction: column; gap: 2px; }
        .conv-branch-children.collapsed { display: none; }
        .conv-item.is-branch { margin-left: 14px; position: relative; }
        .conv-item.is-branch::before {
            content: ''; position: absolute; left: -7px; top: 0; bottom: 50%;
            border-left: 1px solid var(--border-dark); border-bottom: 1px solid var(--border-dark);
            width: 6px; border-bottom-left-radius: 4px;
        }
        .conv-item.dragging { opacity: 0.5; }
        .conv-item[draggable="true"] .conv-item-main { cursor: grab; }
        .conv-item.open-in-pane { box-shadow: inset 0 0 0 1px var(--primary-fade); }

        /* --- 右侧结果区 (Results Panel) --- */
        .results-panel {
            flex: 1;
            background: var(--bg-body);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            height: 100%;
            min-width: 0;
        }

        .results-header {
            background: white;
            padding: 0 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-medium);
            height: 65px;
            flex-shrink: 0;
        }

        .results-header h2 { font-size: 1.125rem; color: var(--text-main); font-weight: 700; }

        .view-toggle {
            display: flex;
            background: var(--bg-body);
            padding: 4px;
            border-radius: var(--radius-md);
            gap: 2px;
        }

        .toggle-btn {
            padding: 6px 16px;
            background: transparent;
            border: none;
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: var(--transition-base);
            display: flex; align-items: center; gap: 6px;
        }
        .toggle-btn:hover { color: var(--text-main); }
        .toggle-btn.active {
            background: white;
            color: var(--text-main);
            box-shadow: var(--shadow-sm);
        }

        .results-content {
            flex: 1;
            overflow-y: auto;
            padding: 32px;
            scroll-behavior: smooth;
        }

        /* --- 房源卡片 (Property Card) --- */
        .property-card {
            background: white;
            border: 1px solid var(--border-medium);
            border-radius: var(--radius-lg);
            overflow: hidden;
            margin-bottom: 24px;
            transition: var(--transition-base);
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-sm);
        }
        .property-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
            border-color: var(--border-dark);
        }

        @media (min-width: 1024px) {
            .property-card { flex-direction: row; min-height: 220px; }
            .property-image-container { flex: 0 0 300px; height: auto !important; }
        }

        .property-image-container {
            position: relative;
            height: 200px;
            background: var(--bg-body);
            cursor: pointer;
            overflow: hidden;
        }
        .property-image { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
        .property-card:hover .property-image { transform: scale(1.03); }

        .rank-badge {
            position: absolute; top: 12px; left: 12px;
            background: white; color: var(--text-main);
            padding: 4px 8px; border-radius: var(--radius-sm);
            font-weight: 700; font-size: 12px;
            box-shadow: var(--shadow-md);
            z-index: 2;
        }

        .image-count-badge {
            position: absolute; bottom: 12px; right: 12px;
            background: rgba(0,0,0,0.7); color: white;
            padding: 4px 8px; border-radius: var(--radius-sm);
            font-size: 11px; font-weight: 500;
            display: flex; align-items: center; gap: 4px; backdrop-filter: blur(4px);
        }

        .property-content {
            padding: 20px 24px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .property-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
        .property-address {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-main);
            line-height: 1.35;
            margin-right: 12px;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }

        .favorite-btn {
            background: transparent; border: 1px solid var(--border-medium);
            width: 32px; height: 32px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: var(--transition-base);
            color: var(--text-tertiary); flex-shrink: 0;
        }
        .favorite-btn:hover { border-color: var(--primary-color); color: var(--primary-color); background: var(--primary-light); }
        .favorite-btn.active { fill: var(--primary-color); color: var(--primary-color); border-color: var(--primary-color); }

        .property-details { display: flex; gap: 16px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
        .detail-item {
            display: flex; align-items: center; gap: 6px;
            font-size: 0.9rem; font-weight: 600; color: var(--text-main);
            background: var(--bg-body); padding: 4px 10px; border-radius: var(--radius-sm);
        }
        .detail-item .icon { width: 14px; height: 14px; color: var(--text-secondary); }

        /* Move-in / availability line — shown on EVERY card (date / now /
           "ask the agent"), with an optional colored status chip alongside. */
        .property-availability {
            display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
            margin: -4px 0 12px; min-width: 0;
        }
        .property-availability .avail-text {
            display: inline-flex; align-items: center; gap: 6px; min-width: 0;
            font-size: 0.85rem; font-weight: 600; color: var(--text-secondary);
        }
        .property-availability .avail-text .icon { width: 14px; height: 14px; color: var(--text-tertiary); flex-shrink: 0; }

        .property-explanation {
            font-size: 0.875rem; color: var(--text-secondary); line-height: 1.6;
            margin-bottom: 20px; flex: 1;
            display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
        }

        /* Area badge — which search area a listing came from */
        .property-area-badge {
            display: inline-flex; align-items: center; gap: 4px; align-self: flex-start;
            font-size: 11px; font-weight: 600; letter-spacing: 0.02em;
            color: var(--primary-color); background: var(--primary-light);
            border: 1px solid var(--primary-fade); border-radius: var(--radius-full);
            padding: 3px 10px; margin-bottom: 8px; max-width: 100%;
        }
        .property-area-badge .icon { width: 12px; height: 12px; color: currentColor; flex-shrink: 0; }
        .property-area-badge .area-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* Expandable full description */
        .property-details-toggle {
            align-self: flex-start; background: none; border: none; padding: 0;
            font-family: inherit; font-size: 0.8rem; font-weight: 600;
            color: var(--text-secondary); cursor: pointer;
            display: inline-flex; align-items: center; gap: 5px; margin: -8px 0 14px;
        }
        .property-details-toggle:hover { color: var(--primary-color); }
        .property-details-toggle .caret { transition: transform 0.2s ease; font-size: 0.7em; }
        .property-details-toggle.open .caret { transform: rotate(180deg); }
        .property-description {
            font-size: 0.85rem; color: var(--text-secondary); line-height: 1.65;
            background: var(--bg-body); border: 1px solid var(--border-medium);
            border-radius: var(--radius-md); padding: 12px 14px; margin-bottom: 16px;
            max-height: 220px; overflow-y: auto; white-space: pre-wrap; word-break: break-word;
        }

        .property-actions { display: flex; gap: 10px; margin-top: auto; }
        .action-btn {
            flex: 1; padding: 9px;
            border: 1px solid var(--border-medium); background: white;
            border-radius: var(--radius-md); cursor: pointer;
            font-size: 0.85rem; font-weight: 600; color: var(--text-main);
            transition: var(--transition-base); display: flex; align-items: center; justify-content: center; gap: 6px;
            text-decoration: none;
        }
        .action-btn:hover { background: var(--bg-hover); border-color: var(--border-dark); }
        .action-btn.primary {
            background: var(--text-main);
            color: white;
            border-color: var(--text-main);
        }
        .action-btn.primary:hover { background: #000; border-color: #000; }

        /* Loading & Typing Indicators */
        .typing-indicator span { width: 5px; height: 5px; background: var(--text-tertiary); border-radius: 50%; display: inline-block; animation: bounce 1.4s infinite ease-in-out both; margin: 0 2px;}
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
        .empty-state-icon { margin-bottom: 16px; color: var(--border-dark); }

        .spinner { width: 24px; height: 24px; border: 2px solid var(--border-medium); border-top-color: var(--primary-color); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Modal Gallery */
        .modal { background: rgba(0, 0, 0, 0.92); z-index: 2000; display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { width: 100%; height: 100%; position: relative; display: flex; flex-direction: column; }
        .gallery-main-image { width: 100%; height: 100%; object-fit: contain; }
        .gallery-nav button { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1); color: white; width: 48px; height: 48px; border-radius: 50%; cursor: pointer; z-index: 10; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .gallery-nav button:hover { background: rgba(255,255,255,0.2); }
        .gallery-nav button:first-child { left: 24px; }
        .gallery-nav button:last-child { right: 24px; }
        .modal-close-btn { position: absolute; top: 24px; right: 24px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1); color: white; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; z-index: 20; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .modal-close-btn:hover { background: rgba(255,255,255,0.2); transform: rotate(90deg); }
        .gallery-thumbnails { position: absolute; bottom: 30px; left: 0; width: 100%; display: flex; justify-content: center; gap: 8px; z-index: 10; padding: 0 20px; overflow-x: auto; }
        .gallery-thumbnail { width: 60px; height: 40px; object-fit: cover; border-radius: 4px; opacity: 0.5; cursor: pointer; transition: all 0.2s; border: 2px solid transparent; }
        .gallery-thumbnail.active { opacity: 1; border-color: var(--primary-color); transform: translateY(-4px); }

        /* Map Modal (card-style preview of a property's location map) */
        #mapModal { z-index: 2600; }
        .map-modal-content {
            width: 90vw; height: 85vh; max-width: 1100px;
            background: var(--bg-surface); border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg); overflow: hidden;
            display: flex; flex-direction: column; animation: slideIn 0.2s ease;
        }
        .map-modal-header {
            display: flex; align-items: center; justify-content: space-between; gap: 12px;
            padding: 14px 16px; border-bottom: 1px solid var(--border-medium); flex-shrink: 0;
        }
        .map-modal-title {
            font-size: 0.95rem; font-weight: 700; color: var(--text-main);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .map-modal-close {
            position: static; flex-shrink: 0;
            background: var(--bg-hover); border-color: var(--border-medium); color: var(--text-secondary);
        }
        .map-modal-close:hover { background: var(--border-medium); }
        .map-modal-body { flex: 1; min-height: 0; background: var(--bg-body); }

        /* Alert Box */
        .alert-box {
            border: 1px solid;
            border-radius: var(--radius-lg);
            padding: 16px;
            margin-bottom: 24px;
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }
        .alert-warning { background: #fffbeb; border-color: #fcd34d; color: #92400e; }
        .alert-success { background: #ecfdf5; border-color: #a7f3d0; color: #065f46; }

        /* ============================================================= */
        /* CONVERSATION SIDEBAR                                           */
        /* ============================================================= */
        .navbar-left { display: flex; align-items: center; gap: 12px; }
        .menu-toggle {
            display: none; width: 38px; height: 38px;
            border: 1px solid var(--border-medium); background: white;
            border-radius: var(--radius-md); cursor: pointer;
            align-items: center; justify-content: center; color: var(--text-main);
        }
        .menu-toggle:hover { background: var(--bg-hover); }

        .conv-sidebar {
            flex: 0 0 260px;
            background: var(--bg-surface);
            display: flex;
            flex-direction: column;
            height: 100%;
            min-width: 0;
        }
        .conv-sidebar-header {
            display: flex; align-items: center; justify-content: space-between;
            gap: 8px;
            padding: 16px 16px 12px 16px;
            border-bottom: 1px solid var(--border-medium);
            flex-shrink: 0;
        }
        .conv-sidebar-title {
            font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.6px; color: var(--text-tertiary);
        }
        .new-chat-btn {
            display: flex; align-items: center; gap: 6px;
            padding: 6px 10px; border: 1px solid var(--border-medium);
            background: white; color: var(--text-main); border-radius: var(--radius-md);
            font-size: 12px; font-weight: 600; cursor: pointer; transition: var(--transition-base);
            white-space: nowrap;
        }
        .new-chat-btn:hover { border-color: var(--primary-color); color: var(--primary-color); background: var(--primary-light); }
        .new-chat-btn .icon { width: 14px; height: 14px; }

        .conv-list { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 2px; }
        .conv-empty { padding: 28px 12px; text-align: center; color: var(--text-tertiary); font-size: 12px; }
        .conv-item {
            display: flex; align-items: center; border-radius: var(--radius-md);
            transition: var(--transition-base); position: relative;
        }
        .conv-item:hover { background: var(--bg-hover); }
        .conv-item.active { background: var(--primary-light); }
        .conv-item.active .conv-title { color: var(--primary-color); font-weight: 600; }
        .conv-item-main {
            flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px;
            padding: 9px 10px; background: none; border: none; cursor: pointer; text-align: left;
            font-family: inherit;
        }
        .conv-title-row { display: flex; align-items: center; gap: 5px; min-width: 0; }
        .conv-branch-glyph { flex-shrink: 0; display: inline-flex; color: var(--text-tertiary); }
        .conv-branch-glyph .icon { width: 12px; height: 12px; }
        .conv-item.active .conv-branch-glyph { color: var(--primary-color); }
        .conv-title { font-size: 0.85rem; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .conv-meta { font-size: 11px; color: var(--text-tertiary); }
        .conv-item-actions { display: flex; gap: 2px; padding-right: 6px; opacity: 0; transition: var(--transition-base); }
        .conv-item:hover .conv-item-actions, .conv-item.active .conv-item-actions { opacity: 1; }
        .conv-icon-btn {
            width: 26px; height: 26px; border: none; background: transparent; border-radius: var(--radius-sm);
            color: var(--text-tertiary); cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: var(--transition-base);
        }
        .conv-icon-btn:hover { background: white; color: var(--primary-color); }
        .conv-icon-btn .icon { width: 14px; height: 14px; }

        /* ============================================================= */
        /* USER MENU                                                      */
        /* ============================================================= */
        .conv-sidebar-footer { border-top: 1px solid var(--border-medium); padding: 10px; position: relative; flex-shrink: 0; }
        .user-menu-btn {
            width: 100%; display: flex; align-items: center; gap: 10px; padding: 8px 10px;
            background: none; border: 1px solid transparent; border-radius: var(--radius-md);
            cursor: pointer; transition: var(--transition-base); text-align: left; font-family: inherit;
        }
        .user-menu-btn:hover { background: var(--bg-hover); border-color: var(--border-medium); }
        .user-avatar {
            width: 30px; height: 30px; border-radius: 50%; background: var(--primary-color); color: white;
            display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; flex-shrink: 0;
            text-transform: uppercase;
        }
        .user-name { flex: 1; min-width: 0; font-size: 0.85rem; font-weight: 600; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .user-menu-btn .icon { color: var(--text-tertiary); width: 15px; height: 15px; }
        .user-dropdown {
            display: none; position: absolute; bottom: calc(100% + 4px); left: 10px; right: 10px;
            background: white; border: 1px solid var(--border-medium); border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg); overflow: hidden; z-index: 60;
        }
        .user-dropdown.open { display: block; }
        .user-dropdown button {
            width: 100%; display: flex; align-items: center; gap: 8px; padding: 10px 12px;
            background: none; border: none; cursor: pointer; font-size: 0.85rem; color: var(--text-main);
            transition: var(--transition-base); text-align: left; font-family: inherit;
        }
        .user-dropdown button:hover { background: var(--bg-hover); }
        .user-dropdown button.danger { color: var(--primary-color); }
        .user-dropdown .icon { width: 15px; height: 15px; color: var(--text-secondary); }
        .user-dropdown button.danger .icon { color: var(--primary-color); }
        .user-dropdown-divider { height: 1px; background: var(--border-medium); margin: 2px 0; }

        /* ============================================================= */
        /* TOASTS                                                         */
        /* ============================================================= */
        .toast-container {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            display: flex; flex-direction: column; gap: 10px; z-index: 3000; width: min(92vw, 440px);
            pointer-events: none;
        }
        .toast {
            display: flex; align-items: center; gap: 12px; padding: 12px 16px;
            background: var(--text-main); color: white; border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg); font-size: 0.85rem; animation: toastIn 0.25s ease;
            pointer-events: auto;
        }
        .toast span { flex: 1; }
        .toast-error { background: #7f1d1d; }
        .toast-success { background: #065f46; }
        .toast-action {
            background: rgba(255,255,255,0.16); border: none; color: white; font-weight: 600;
            padding: 5px 12px; border-radius: var(--radius-sm); cursor: pointer; font-size: 0.8rem; white-space: nowrap;
        }
        .toast-action:hover { background: rgba(255,255,255,0.28); }
        .toast-hide { opacity: 0; transform: translateY(8px); transition: all 0.3s ease; }
        @keyframes toastIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

        /* ============================================================= */
        /* DIALOG                                                         */
        /* ============================================================= */
        .dialog-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45);
            z-index: 2500; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(2px);
        }
        .dialog-card {
            background: white; border-radius: var(--radius-lg); box-shadow: var(--shadow-lg);
            width: min(92vw, 400px); padding: 24px; animation: slideIn 0.2s ease;
        }
        .dialog-title { font-size: 1.05rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px; }
        .dialog-message { font-size: 0.9rem; color: var(--text-secondary); line-height: 1.5; margin-bottom: 16px; }
        .dialog-input {
            width: 100%; padding: 10px 12px; border: 1px solid var(--border-medium); border-radius: var(--radius-md);
            font-size: 0.925rem; font-family: inherit; color: var(--text-main); outline: none; margin-bottom: 20px;
            transition: var(--transition-base);
        }
        .dialog-input:focus { border-color: var(--primary-color); box-shadow: var(--shadow-focus); }
        .dialog-actions { display: flex; gap: 10px; justify-content: flex-end; }
        .dialog-btn {
            padding: 9px 16px; border: 1px solid var(--border-medium); background: white;
            border-radius: var(--radius-md); font-size: 0.85rem; font-weight: 600; color: var(--text-main);
            cursor: pointer; transition: var(--transition-base); font-family: inherit;
        }
        .dialog-btn:hover { background: var(--bg-hover); }
        .dialog-btn.primary { background: var(--primary-color); color: white; border-color: var(--primary-color); }
        .dialog-btn.primary:hover { background: var(--primary-hover); }

        /* ============================================================= */
        /* SEARCH CRITERIA PANEL + FORM (shared with modal)              */
        /* ============================================================= */
        .criteria-panel { padding: 16px 32px 0 32px; background: var(--bg-body); flex-shrink: 0; }
        .criteria-card {
            background: var(--bg-surface); border: 1px solid var(--border-medium);
            border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); overflow: hidden;
        }
        .criteria-header {
            display: flex; align-items: center; justify-content: space-between; gap: 8px;
            padding: 12px 16px; cursor: pointer; user-select: none; outline: none;
        }
        .criteria-header:hover { background: var(--bg-hover); }
        .criteria-header:focus-visible { box-shadow: inset 0 0 0 2px var(--primary-fade); }
        .criteria-title {
            display: flex; align-items: center; gap: 8px;
            font-size: 0.9rem; font-weight: 700; color: var(--text-main);
        }
        .criteria-title .icon { color: var(--primary-color); }
        .criteria-chevron { color: var(--text-tertiary); transition: transform 0.2s ease; }
        .criteria-panel.collapsed .criteria-chevron { transform: rotate(-90deg); }
        .criteria-panel.collapsed .criteria-body { display: none; }
        .criteria-body { padding: 4px 16px 16px 16px; }

        /* Shared field grid (used by both the panel body and the modal) */
        .criteria-form { display: block; }
        .criteria-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .criteria-field {
            display: flex; flex-direction: column; gap: 5px; min-width: 0; margin: 0;
        }
        .criteria-field.col-span-2 { grid-column: 1 / -1; }
        .criteria-label {
            font-size: 11px; font-weight: 600; color: var(--text-secondary);
            letter-spacing: 0.2px; display: inline-flex; align-items: center;
        }
        .criteria-label .req { color: var(--primary-color); }
        .criteria-input, .criteria-select {
            width: 100%; min-width: 0; padding: 8px 10px;
            border: 1px solid var(--border-medium); border-radius: var(--radius-md);
            font-size: 0.875rem; font-family: inherit; color: var(--text-main);
            background: var(--bg-surface); outline: none; transition: var(--transition-base);
        }
        .criteria-input:focus, .criteria-select:focus {
            border-color: var(--primary-color); box-shadow: var(--shadow-focus);
        }
        .criteria-input.input-error, .criteria-select.input-error {
            border-color: var(--primary-color); box-shadow: 0 0 0 3px var(--primary-fade);
        }
        .criteria-input:disabled, .criteria-select:disabled {
            background: var(--bg-body); color: var(--text-tertiary); cursor: not-allowed;
        }
        .criteria-budget-row { display: flex; gap: 6px; min-width: 0; }
        .criteria-budget-row .criteria-input { flex: 1 1 auto; }
        .criteria-budget-row .criteria-select { flex: 0 0 auto; width: auto; padding: 8px 6px; }

        /* Move-in date: the native <input type=date> placeholder (e.g. 年/月/日) is
           locale-bound and can't be i18n'd, so when the field is empty & unfocused we
           blank the browser's placeholder and render our own localized one on top.
           Focusing the field restores the native edit so keyboard entry stays visible;
           the calendar picker icon is unaffected. */
        .criteria-date-wrap { position: relative; display: block; width: 100%; }
        .criteria-date-wrap.is-empty .criteria-date-native:not(:focus)::-webkit-datetime-edit { color: transparent; }
        .criteria-date-ph {
            position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
            pointer-events: none; font-size: 0.875rem; color: var(--text-tertiary);
            background: var(--bg-surface); padding-right: 4px; display: none;
        }
        .criteria-date-wrap.is-empty .criteria-date-native:not(:focus) ~ .criteria-date-ph { display: block; }
        .criteria-field.criteria-check {
            flex-direction: row; align-items: center; gap: 8px; cursor: pointer;
            align-self: end; padding-bottom: 8px;
        }
        .criteria-check input[type="checkbox"] {
            width: 16px; height: 16px; accent-color: var(--primary-color);
            cursor: pointer; flex-shrink: 0; margin: 0;
        }
        .criteria-check .criteria-label { font-size: 0.85rem; color: var(--text-main); cursor: pointer; }
        .criteria-field.is-disabled .criteria-label { opacity: 0.5; }
        /* Error highlight for the checkbox row (inputs/selects use .input-error above). */
        .criteria-field.field-error {
            border-radius: var(--radius-md); box-shadow: 0 0 0 3px var(--primary-fade);
        }
        .criteria-field.field-error .criteria-label { color: var(--primary-color); }
        .criteria-search-btn {
            width: 100%; margin-top: 14px; padding: 10px 12px; border: none;
            border-radius: var(--radius-md); background: var(--primary-color); color: white;
            font-family: inherit; font-size: 0.9rem; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: var(--transition-base);
        }
        .criteria-search-btn:hover { background: var(--primary-hover); }
        .criteria-search-btn:disabled { background: var(--text-tertiary); cursor: not-allowed; }
        .criteria-search-btn .icon { color: currentColor; }

        /* Selected search-area chips (multi-area) inside the criteria form */
        .area-chips { display: flex; flex-wrap: wrap; gap: 6px; margin: 2px 0 8px; }
        .area-chip {
            display: inline-flex; align-items: center; gap: 4px;
            background: var(--primary-light); color: var(--primary-color);
            border: 1px solid var(--primary-fade); border-radius: var(--radius-full);
            padding: 3px 6px 3px 10px; font-size: 0.8rem; font-weight: 600; max-width: 100%;
        }
        .area-chip-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 160px; }
        .area-chip-remove {
            display: inline-flex; align-items: center; justify-content: center;
            width: 16px; height: 16px; border: none; border-radius: 50%;
            background: transparent; color: currentColor; cursor: pointer;
            font-size: 15px; line-height: 1; padding: 0; flex-shrink: 0;
        }
        .area-chip-remove:hover { background: var(--primary-color); color: white; }

        /* Recommended-area chips shown above the results */
        .area-recos {
            background: var(--bg-surface); border: 1px solid var(--border-medium);
            border-radius: var(--radius-lg); padding: 14px 16px; margin-bottom: 20px;
            box-shadow: var(--shadow-xs);
        }
        .area-recos-label {
            display: flex; align-items: center; gap: 4px;
            font-size: 0.8rem; font-weight: 700; color: var(--text-secondary); margin-bottom: 10px;
        }
        .area-recos-label .icon { color: var(--primary-color); }
        .area-recos-chips { display: flex; flex-wrap: wrap; gap: 8px; }
        .area-reco-chip {
            display: inline-flex; align-items: baseline;
            background: white; border: 1px solid var(--border-medium);
            border-radius: var(--radius-full); padding: 6px 14px;
            font-family: inherit; font-size: 0.85rem; font-weight: 600;
            color: var(--text-main); cursor: pointer; transition: var(--transition-base);
        }
        .area-reco-chip:hover { border-color: var(--primary-color); color: var(--primary-color); background: var(--primary-light); }
        .area-reco-name { font-weight: 700; }
        .area-reco-meta { color: var(--text-tertiary); font-weight: 500; }
        .area-reco-chip:hover .area-reco-meta { color: var(--primary-color); }
        .area-reco-chip.selected {
            background: var(--primary-color); color: white; border-color: var(--primary-color); cursor: default;
        }
        .area-reco-chip.selected::before { content: "\2713"; margin-right: 5px; font-weight: 700; }
        .area-reco-chip.selected .area-reco-meta { color: rgba(255,255,255,0.8); }

        /* Criteria modal (hosted inside #dialogOverlay, reusing .dialog-card) */
        .dialog-card.criteria-modal-card { width: min(94vw, 460px); }
        .criteria-modal-cancel { display: flex; justify-content: flex-end; margin-top: 10px; }

        .sidebar-backdrop { display: none; }

        /* ============================================================= */
        /* RESPONSIVE                                                     */
        /* ============================================================= */
        @media (max-width: 1024px) {
            .main-container { flex-direction: column; height: auto; }
            .chat-panel { flex: none; height: 60vh; width: 100%; border-bottom: 1px solid var(--border-medium); }
            .results-panel { min-height: 60vh; }
            .navbar { padding: 0 16px; }
            .results-header { padding: 0 16px; }
            .results-content { padding: 16px; }
            .criteria-panel { padding: 12px 16px 0 16px; }

            .menu-toggle { display: flex; }
            .conv-sidebar {
                position: fixed; top: 60px; left: 0; bottom: 0; width: 280px; z-index: 120;
                transform: translateX(-100%); transition: transform 0.25s ease;
                box-shadow: var(--shadow-lg); border-right: 1px solid var(--border-medium);
            }
            .conv-sidebar.open { transform: translateX(0); }
            .sidebar-backdrop.open {
                display: block; position: fixed; top: 60px; left: 0; right: 0; bottom: 0;
                background: rgba(0,0,0,0.4); z-index: 110;
            }
        }

        /* Narrow screens: collapse the criteria grid to a single column */
        @media (max-width: 600px) {
            .criteria-grid { grid-template-columns: 1fr; }
            .criteria-field.criteria-check { align-self: start; padding-bottom: 0; }
        }

    <script>
        /* -------------------------------------------------------------------------- */
        /* CONFIGURATION                                                              */
        /* -------------------------------------------------------------------------- */
        // If empty, relative paths are used (standard for production / same-origin).
        // When opening the file directly (file:/blob:), we default to localhost:5001.
        let API_BASE_URL = '';
        const API_TIMEOUT_MS = 240000; // 240s per contract

        /* -------------------------------------------------------------------------- */
        /* SMALL HELPERS                                                              */
        /* -------------------------------------------------------------------------- */
        function el(tag, className) {
            const node = document.createElement(tag);
            if (className) node.className = className;
            return node;
        }

        // Escape ALL HTML-significant characters. Used wherever dynamic text is placed
        // into an innerHTML string (kept minimal — most rendering uses textContent).
        function escapeHtml(text) {
            if (text === null || text === undefined) return '';
            return String(text)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        // Only allow safe navigable link schemes (blocks javascript:, data:, etc.)
        function isSafeHref(url) {
            if (!url) return false;
            return /^(https?:|mailto:)/i.test(String(url).trim());
        }

        // Only allow safe image sources.
        function safeImgSrc(src) {
            if (!src) return '';
            return /^(https?:|data:image\/)/i.test(String(src).trim()) ? String(src) : '';
        }

        // uuid4 hex (32 chars, matches contract [A-Za-z0-9_-]+, 1-64 chars)
        function uuidHex() {
            if (window.crypto && typeof window.crypto.randomUUID === 'function') {
                return window.crypto.randomUUID().replace(/-/g, '');
            }
            let out = '';
            for (let i = 0; i < 32; i++) {
                out += Math.floor(Math.random() * 16).toString(16);
            }
            return out;
        }

        /* -------------------------------------------------------------------------- */
        /* IDENTITY (localStorage per contract)                                       */
        /* -------------------------------------------------------------------------- */
        const LS_USER_ID = 'ukra_user_id';
        const LS_USER_NAME = 'ukra_user_name';
        const LS_ACTIVE_CONV = 'ukra_active_conversation';
        const LS_VIEWED_PROPERTIES_PREFIX = 'ukra_viewed_properties:';
        const MAX_VIEWED_PROPERTIES = 10;

        function getUserId() {
            return localStorage.getItem(LS_USER_ID) || '';
        }
        function getUserName() {
            return localStorage.getItem(LS_USER_NAME) || 'Guest';
        }
        function viewedPropertiesStorageKey() {
            return LS_VIEWED_PROPERTIES_PREFIX + getUserId();
        }

        function ensureIdentity() {
            let uid = localStorage.getItem(LS_USER_ID);
            if (!uid || !/^[A-Za-z0-9_-]{1,64}$/.test(uid)) {
                uid = uuidHex();
                localStorage.setItem(LS_USER_ID, uid);
            }
            if (!localStorage.getItem(LS_USER_NAME)) {
                localStorage.setItem(LS_USER_NAME, 'Guest');
            }
            bootConversationId = localStorage.getItem(LS_ACTIVE_CONV) || null;
        }

        /* -------------------------------------------------------------------------- */
        /* API FETCH WRAPPER                                                          */
        /* - credentials:'include' sends the server-issued signed identity cookie      */
        /* - AbortController + 240s timeout; links an optional external signal        */
        /* - THROWS on network/abort so callers can surface toasts (no silent swallow)*/
        /* -------------------------------------------------------------------------- */
        function resolveUrl(endpoint) {
            if (!endpoint.startsWith('/')) endpoint = '/' + endpoint;
            const isLocalContext = window.location.protocol === 'file:' || window.location.protocol === 'blob:';
            if (API_BASE_URL) return API_BASE_URL + endpoint;
            if (isLocalContext) return 'http://localhost:5001' + endpoint;
            return endpoint;
        }

        async function apiFetch(endpoint, options = {}) {
            const method = (options.method || 'GET').toUpperCase();
            let url = resolveUrl(endpoint);

            const headers = Object.assign({}, options.headers || {});

            const controller = new AbortController();
            const timeoutId = setTimeout(function () {
                controller.abort(new DOMException('Request timed out', 'TimeoutError'));
            }, options.timeout || API_TIMEOUT_MS);

            // Chain an external signal (e.g. the visible Cancel button).
            if (options.signal) {
                if (options.signal.aborted) {
                    controller.abort();
                } else {
                    options.signal.addEventListener('abort', function () { controller.abort(); }, { once: true });
                }
            }

            const finalOptions = Object.assign({}, options, {
                method: method,
                headers: headers,
                credentials: 'include',
                signal: controller.signal
            });

            try {
                return await fetch(url, finalOptions);
            } finally {
                clearTimeout(timeoutId);
            }
        }

        let currentResults = [];

        /* owned by a ChatPane instance. Single mode = one pane (main); split mode adds */
        /* a fully-interactive secondary pane. The right-hand results/criteria panel is */
        /* shared and driven by whichever pane last searched (resultsOwnerPane).        */
        /* -------------------------------------------------------------------------- */
        function ChatPane(opts) {
            this.id = opts.id;
            this.root = opts.root;                       // .chat-pane element
            this.messagesEl = opts.messagesEl;
            this.inputEl = opts.inputEl;
            this.sendBtnEl = opts.sendBtnEl;
            this.focusIndicatorEl = opts.focusIndicatorEl;
            this.quickActionsEl = opts.quickActionsEl || null;
            this.titleEl = opts.titleEl || null;         // secondary top-bar title (main = null)
            this.conversationId = null;
            this.isProcessing = false;
            this.lastResponseType = null;
            this.activeController = null;                 // in-flight request (for cancel)
            this.lastUserMessage = '';
            this.focusStack = [];                         // 聚焦栈：旧→新，末位=当前聚焦；内存态，切会话清空
            this.versionMap = {};                         // slot_turn_id -> [{conversation_id,created_at,title}]
            this.showingWelcome = false;
            this.typingEl = null;                         // this pane's typing indicator (per-pane, no shared id)
            this.results = [];                            // cached recs so the shared panel can repaint on owner change
            this.areaRecos = [];
            this.root._pane = this;
        }

        let mainPane = null;            // the original / left pane (persists to localStorage)
        let secondaryPane = null;       // the compare / right pane (ephemeral), null when single
        let activePane = null;          // last-focused chat pane (fallback Ask-AI/criteria target)
        let resultsOwnerPane = null;    // pane that owns the shared results + criteria panel
        let splitMode = false;
        let bootConversationId = null;  // localStorage active conv, read at boot, assigned to mainPane in initApp

        function eachPane(fn) { if (mainPane) fn(mainPane); if (secondaryPane) fn(secondaryPane); }
        function allPanes() { return secondaryPane ? [mainPane, secondaryPane] : [mainPane]; }
        // Resolve the pane owning a DOM node (event target); falls back to active/main.
        function paneFromEl(node) {
            const root = (node && node.closest) ? node.closest('.chat-pane') : null;
            return (root && root._pane) || activePane || mainPane;
        }
        // Pane owning the shared results/criteria surface (cards, Ask-AI, criteria submit).
        function ownerPane() { return resultsOwnerPane || activePane || mainPane; }
        function anyPaneProcessing() { return allPanes().some(p => p && p.isProcessing); }
        function paneForConversation(cid) {
            if (!cid) return null;
            if (mainPane && mainPane.conversationId === cid) return mainPane;
            if (secondaryPane && secondaryPane.conversationId === cid) return secondaryPane;
            return null;
